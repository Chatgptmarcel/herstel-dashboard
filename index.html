                                                    </div>
                                                    <button onClick={(ev)=>{ev.stopPropagation(); handleDeleteShift(dateKey, e.id)}} className="opacity-0 group-hover/item:opacity-100 text-red-500 ml-1 shrink-0"><Trash2 size={10}/></button>
                                                </div>
                                            );
                                        }
                                        // Handmatige shift (geen notitie, geen G4S)
                                        return (
                                            <div key={`m-${e.id}`} className="text-[9px] p-1 rounded border mb-0.5 flex justify-between items-center group/item bg-white shadow-sm text-orange-800 border-orange-200 w-full text-left">
                                                <div className="overflow-hidden w-full">
                                                    <div className="font-bold">{e.startTime} - {e.endTime}</div>
                                                    <div className="truncate opacity-80">{e.summary}</div>
                                                </div>
                                                <button onClick={(ev)=>{ev.stopPropagation(); handleDeleteShift(dateKey, e.id)}} className="opacity-0 group-hover/item:opacity-100 text-red-500 ml-1 shrink-0"><Trash2 size={10}/></button>
                                            </div>
                                        );
                                    }
                                    return null;
                                })}
                                
                                {/* 4. TRACKING INDICATORS ONDERAAN */}
                                {daySoberCount > 0 && <div className={`flex items-center text-[9px] ${currentDate.toDateString() === date.toDateString() ? "text-white bg-green-600 border-green-600 font-bold" : "text-green-700 bg-white/50 border-green-100"} p-0.5 rounded border w-full mt-auto transition-colors`}><CheckCircle size={10} className="mr-1"/> Dag {daySoberCount}</div>}
                                {isArmDay && <div className="flex items-center text-[9px] text-red-700 font-bold bg-white/50 p-0.5 rounded border border-red-100 w-full"><Activity size={10} className="mr-1"/> Armen</div>}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            // Trigion-loonperiodes: 13 periodes van 4 weken (ma t/m zo), gekoppeld aan ISO-kalenderweken.
            // Periode N = week (4N−3) t/m week 4N; in een jaar met 53 weken duurt periode 13 vijf weken.
            const isoWeekInfo = (d) => {
                const date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                const dag = (date.getDay() + 6) % 7; // ma=0 ... zo=6
                date.setDate(date.getDate() - dag + 3); // donderdag van deze week bepaalt het ISO-jaar
                const isoYear = date.getFullYear();
                const jan4 = new Date(isoYear, 0, 4);
                const week = 1 + Math.round(((date - jan4) / 86400000 - 3 + ((jan4.getDay() + 6) % 7)) / 7);
                return { isoYear, week };
            };
            const maandagVanWeek = (isoYear, week) => {
                const jan4 = new Date(isoYear, 0, 4);
                const ma = new Date(jan4);
                ma.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7) + (week - 1) * 7);
                return ma;
            };
            const wekenInIsoJaar = (isoYear) => isoWeekInfo(new Date(isoYear, 11, 28)).week; // 28 dec valt altijd in de laatste ISO-week
            const periodeInfo = (dateKey) => {
                const { isoYear, week } = isoWeekInfo(new Date(`${dateKey}T12:00:00`));
                const nr = Math.min(13, Math.ceil(week / 4));
                const eindWeek = nr === 13 ? wekenInIsoJaar(isoYear) : nr * 4;
                const start = maandagVanWeek(isoYear, nr * 4 - 3);
                const eind = maandagVanWeek(isoYear, eindWeek);
                eind.setDate(eind.getDate() + 6); // zondag
                return { key: `${isoYear}-P${String(nr).padStart(2, '0')}`, nr, isoYear, start, eind };
            };

            // Verzamelt alle GEWERKTE diensten (automatisch rooster + handmatige G4S-import) voor de
            // urenadministratie. Past correcties toe, laat verlof/roostervrij weg, ontdubbelt per dag
            // (automatische dienst wint van handmatige), en berekent de uren.
            const buildWorkLog = () => {
                const urenTussen = (start, end) => Math.max(0, (end - start) / 3600000);
                const parseHM = (str) => {
                    const m = (str || "").match(/(\d{1,2})[:.](\d{2})\s*[-–]\s*(\d{1,2})[:.](\d{2})/);
                    return m ? { sh:+m[1], sm:+m[2], eh:+m[3], em:+m[4] } : null;
                };
                const byDate = {};
                // 1) Automatisch rooster (na correcties), zonder verlof.
                Object.keys(rosterShifts).forEach(dateKey => {
                    const raw = (rosterShifts[dateKey] || []).map(s => {
                        const ov = s.uid ? rosterOverrides[s.uid] : null;
                        if (!ov) return s;
                        if (ov.hidden) return null;
                        const m = { ...s, edited: true };
                        if (ov.summary !== undefined) m.summary = ov.summary;
                        if (ov.startISO) m.start = new Date(ov.startISO);
                        if (ov.endISO) m.end = new Date(ov.endISO);
                        return m;
                    }).filter(Boolean);
                    filterRosterShifts(raw).forEach(s => {
                        if (!s.start || !s.end) return;
                        if (s.summary?.toLowerCase().includes('verlof')) return;
                        (byDate[dateKey] = byDate[dateKey] || []).push({
                            dateKey, begin: formatTime(s.start), eind: formatTime(s.end),
                            uren: urenTussen(s.start, s.end),
                            omschrijving: cleanSummary(s.summary) || 'Dienst',
                            bron: s.edited ? 'Rooster (aangepast)' : 'Rooster',
                        });
                    });
                });
                // 2) Handmatig geïmporteerde G4S-diensten — alleen op dagen zonder automatische dienst.
                Object.keys(manualShifts).forEach(dateKey => {
                    if (byDate[dateKey] && byDate[dateKey].length) return;
                    (manualShifts[dateKey] || []).forEach(s => {
                        if (s.isNote || !s.isG4SShift) return;
                        const hm = parseHM(s.summary);
                        let uren = 0, begin = '', eind = '';
                        if (hm) {
                            const start = new Date(`${dateKey}T00:00:00`); start.setHours(hm.sh, hm.sm);
                            let end = new Date(`${dateKey}T00:00:00`); end.setHours(hm.eh, hm.em);
                            if (end <= start) end = new Date(end.getTime() + 24*3600*1000);
                            uren = urenTussen(start, end); begin = formatTime(start); eind = formatTime(end);
                        }
                        (byDate[dateKey] = byDate[dateKey] || []).push({ dateKey, begin, eind, uren, omschrijving: 'Dienst', bron: 'Handmatig' });
                    });
                });
                const nu = new Date();
                const vandaagKey = `${nu.getFullYear()}-${String(nu.getMonth()+1).padStart(2,'0')}-${String(nu.getDate()).padStart(2,'0')}`;
                const entries = Object.values(byDate).flat()
                    .filter(e => e.dateKey <= vandaagKey) // alleen gewerkte diensten t/m vandaag, geen geplande
                    .filter(e => periodeInfo(e.dateKey).isoYear >= 2026) // alleen periodes vanaf 2026
                    .sort((a,b) => a.dateKey < b.dateKey ? -1 : a.dateKey > b.dateKey ? 1 : 0);
                // Onbetaalde pauze per dienst (niet per dag: twee losse diensten op één dag worden
                // elk apart beoordeeld). Recht op pauze vanaf een dienst langer dan 5,5 uur (cao
                // Particuliere Beveiliging art. 29). Op Schiphol worden de kleine pauzes doorbetaald;
                // alleen de grote pauze van 30 minuten is onbetaald.
                const pauzeVoorDienst = (uren) => uren > 5.5 ? 0.5 : 0;
                entries.forEach(e => { e.pauze = pauzeVoorDienst(e.uren); e.netto = e.uren - e.pauze; });
                const periodes = {};
                entries.forEach(e => {
                    const p = periodeInfo(e.dateKey);
                    (periodes[p.key] = periodes[p.key] || { ...p, entries: [], totaal: 0 });
                    periodes[p.key].entries.push(e); periodes[p.key].totaal += e.netto;
                });
                return {
                    periodeGroepen: Object.values(periodes).sort((a,b)=> a.key < b.key ? -1 : 1),
                    totaalUren: entries.reduce((s,e)=>s+e.netto, 0),
                    aantal: entries.length,
                };
            };
            const exportWorkLogCSV = () => {
                const { periodeGroepen } = buildWorkLog();
                const nf = (n) => n.toFixed(2).replace('.', ',');
                const df = (k) => { const [y,m,d] = k.split('-'); return `${d}-${m}-${y}`; };
                const dd = (d) => `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
                const dagNamen = ['zo','ma','di','wo','do','vr','za'];

                periodeGroepen.forEach(g => {

                    rows.push(['', '', '', '', '', `Totaal periode ${g.nr}-${g.isoYear} (${dd(g.start)} t/m ${dd(g.eind)})`, nf(g.totaal), '', '']);
                });
                const csv = '﻿' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

                    {activeTab === 'wk' && <WkSectie data={wkData} laden={wkLaden} fout={wkFout} herlaad={laadWk} />}

                    {activeTab === 'dashboard' && (<>

                    {astroOpen && (

            );
        };

        // Eerste start op de telefoon (GitHub Pages): localStorage is daar nog leeg. Laad dan
        // eenmalig de versleutelde gegevens (mijn_herstel_dashboard.enc.json, gemaakt met
        // tools/versleutel-data.js) na het vragen van het wachtwoord. De onversleutelde data
        // staat bewust NIET in de publieke repo (.gitignore). Daarna is de opslag op het
        // apparaat zelf de waarheid. Op file:// (pc) gebeurt hier niets.
        const ontsleutel = async (pakket, wachtwoord) => {
            const b64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
            const basis = await crypto.subtle.importKey('raw', new TextEncoder().encode(wachtwoord), 'PBKDF2', false, ['deriveKey']);
            const sleutel = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: b64(pakket.salt), iterations: pakket.iteraties, hash: 'SHA-256' },
                basis, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
            );
            const klaar = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(pakket.iv) }, sleutel, b64(pakket.data));
            return JSON.parse(new TextDecoder().decode(klaar));
        };

        const seedVanafServer = async () => {
            const isHttps = location.protocol === 'https:';
            const alGedaan = localStorage.getItem('_seed_json_geladen');
            const heeftData = localStorage.getItem('dashboard_manual_shifts');
            if (!isHttps || alGedaan || heeftData) return;
            try {
                const res = await fetch(`./mijn_herstel_dashboard.enc.json?t=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) return;
                const pakket = await res.json();
                for (let poging = 1; poging <= 3; poging++) {
                    const ww = window.prompt('Eerste start op dit apparaat.\n\nVoer het wachtwoord in om je gegevens te laden\n(staat op de pc in telefoon-wachtwoord.txt).\n\nAnnuleren = zonder gegevens beginnen; bij de volgende start wordt het opnieuw gevraagd.');
                    if (ww === null) return; // geannuleerd: vlag niet zetten, volgende keer opnieuw vragen
                    try {
                        const data = await ontsleutel(pakket, ww.trim());
                        if (data.shifts) localStorage.setItem('dashboard_manual_shifts', JSON.stringify(data.shifts));
                        if (data.sobriety) localStorage.setItem('sobriety_history', JSON.stringify(data.sobriety));
                        if (data.armHistory) localStorage.setItem('arm_history', JSON.stringify(data.armHistory));
                        if (data.minoxStart) localStorage.setItem('minox_start_date', new Date(data.minoxStart).toISOString());
                        if (data.amberShifts) localStorage.setItem('amber_shifts', JSON.stringify(data.amberShifts));
                        if (data.tijdvakShifts) localStorage.setItem('tijdvak_shifts', JSON.stringify(data.tijdvakShifts));
                        if (data.rosterOverrides) localStorage.setItem('dashboard_roster_overrides', JSON.stringify(data.rosterOverrides));
                        localStorage.setItem('_seed_json_geladen', '1');
                        return;
                    } catch (e) {
                        if (poging < 3) alert('Wachtwoord onjuist, probeer het opnieuw.');
                        else alert('Drie keer onjuist. De app start zonder gegevens; herlaad om het opnieuw te proberen.');
                    }
                }
            } catch (e) { console.warn('Startgegevens laden overgeslagen:', e); }
        };

        seedVanafServer().then(() => {
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
        });
    </script>
</body>
</html>
