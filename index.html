<body class="bg-gray-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar as CalendarIcon, 
            CheckCircle, 
            Activity, 
            Droplets, 
            Trophy, 
            ChevronLeft, 
            ChevronRight, 
            Plus, 
            X, 
            Save, 
            Trash2, 
            Briefcase, 
            StickyNote, 
            HardDrive,
            FileJson,
            FolderOpen,
            ExternalLink,
            Settings,
            History,
            RefreshCw,
            Clock,
            FlaskConical,
            Upload,
            FileText,
            AlertCircle,
            Check,
            Heart,
            Eye,
            EyeOff,
            Filter
        } from 'lucide-react';

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [viewDate, setViewDate] = useState(new Date());
            
            // --- HELPER VOOR DATUM FORMATTERING (LOKAAL) ---
            const toLocalISOString = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            // --- SOBRIETY STATE MET HISTORIE ---
            const [sobrietyHistory, setSobrietyHistory] = useState(() => {
                const savedHistory = localStorage.getItem('sobriety_history');
                if (savedHistory) {
                    return JSON.parse(savedHistory).map(p => ({
                        start: new Date(p.start),
                        end: p.end ? new Date(p.end) : null
                    }));
                }
                const oldSavedDate = localStorage.getItem('sobriety_start_date');
                // Neutrale default (privacy): jouw echte startdatum komt uit je JSON-bestand / localStorage
                const defaultDate = new Date();
                return [{ start: oldSavedDate ? new Date(oldSavedDate) : defaultDate, end: null }];
            });

            const [daysSoberToday, setDaysSoberToday] = useState(0);
            const [showSoberSettingsModal, setShowSoberSettingsModal] = useState(false);
            const activeSoberPeriod = sobrietyHistory[sobrietyHistory.length - 1];
            const [newSoberStartDate, setNewSoberStartDate] = useState(toLocalISOString(activeSoberPeriod.start));

            // --- ARM TRAINING STATE MET HISTORIE & CYCLUS ---
            const [armHistory, setArmHistory] = useState(() => {
                const savedHistory = localStorage.getItem('arm_history');
                if (savedHistory) {
                    return JSON.parse(savedHistory).map(p => ({
                        start: new Date(p.start),
                        end: p.end ? new Date(p.end) : null,
                        cycle: p.cycle || 3
                    }));
                }
                const oldSavedDate = localStorage.getItem('arm_start_date');
                // Neutrale default (privacy): jouw echte startdatum komt uit je JSON-bestand / localStorage
                const defaultDate = new Date();
                return [{ start: oldSavedDate ? new Date(oldSavedDate) : defaultDate, end: null, cycle: 3 }];
            });

            const [armStatus, setArmStatus] = useState("");
            const [showArmSettingsModal, setShowArmSettingsModal] = useState(false);
            const activeArmPeriod = armHistory[armHistory.length - 1];
            const [newArmStartDate, setNewArmStartDate] = useState(toLocalISOString(activeArmPeriod.start));
            const [newArmCycle, setNewArmCycle] = useState(activeArmPeriod.cycle || 3);

            // --- MINOXIDIL STATE ---
            const [minoxStartDate, setMinoxStartDate] = useState(() => {
                const savedDate = localStorage.getItem('minox_start_date');
                // Neutrale default (privacy): jouw echte startdatum komt uit je JSON-bestand / localStorage
                return savedDate ? new Date(savedDate) : new Date();
            });
            const [minoxDisplay, setMinoxDisplay] = useState("");
            const [showMinoxSettingsModal, setShowMinoxSettingsModal] = useState(false);
            const [newMinoxStartDateInput, setNewMinoxStartDateInput] = useState(toLocalISOString(minoxStartDate));
            
            // Opslag status en File Handle
            const [saveStatus, setSaveStatus] = useState("Niet gekoppeld");
            const [fileHandle, setFileHandle] = useState(null);

            // DATA
            const [ortecShifts, setOrtecShifts] = useState({});
            const [manualShifts, setManualShifts] = useState({});

            // STATES
            const [loadingShifts, setLoadingShifts] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [selectedDate, setSelectedDate] = useState(null);
            const [newNote, setNewNote] = useState(""); 

            // PDF UPLOAD STATES
            const [showPdfModal, setShowPdfModal] = useState(false);
            const [pdfParsing, setPdfParsing] = useState(false);
            const [parsedShifts, setParsedShifts] = useState([]);
            const [pdfError, setPdfError] = useState(null); 

            // AMBER ROOSTER STATES
            const [amberShifts, setAmberShifts] = useState(() => {
                const saved = localStorage.getItem('amber_shifts');
                return saved ? JSON.parse(saved) : {};
            });
            const [showAmberModal, setShowAmberModal] = useState(false);
            const [amberMonth, setAmberMonth] = useState(new Date().getMonth());
            const [amberYear, setAmberYear] = useState(new Date().getFullYear());
            const [amberBulkInput, setAmberBulkInput] = useState("");
            const [amberBulkParsed, setAmberBulkParsed] = useState([]);
            const [amberAnalyzing, setAmberAnalyzing] = useState(false);
            const [amberAnalyzeError, setAmberAnalyzeError] = useState(null);

            // TIJDVAK ROOSTER STATES (G4S Connect voorlopige roosters)
            const [tijdvakShifts, setTijdvakShifts] = useState(() => {
                const saved = localStorage.getItem('tijdvak_shifts');
                return saved ? JSON.parse(saved) : {};
            });
            const [showTijdvakModal, setShowTijdvakModal] = useState(false);
            const [tijdvakMonth, setTijdvakMonth] = useState(new Date().getMonth());
            const [tijdvakYear, setTijdvakYear] = useState(new Date().getFullYear());
            const [tijdvakBulkInput, setTijdvakBulkInput] = useState("");
            const [tijdvakBulkParsed, setTijdvakBulkParsed] = useState([]);

            // KALENDER FILTER STATES
            const [showFilters, setShowFilters] = useState(false);
            const [calendarFilters, setCalendarFilters] = useState(() => {
                const saved = localStorage.getItem('calendar_filters');
                const defaults = {
                    showSwimming: true,
                    showTraining: true,
                    showSobriety: true,
                    showAmber: true,
                    showWork: true,
                    showNotes: true,
                    showSalary: true,
                    showTijdvak: true
                };
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return { ...defaults, ...parsed };
                }
                return defaults;
            }); 

            // CONFIGURATIE VAST
            // Werkrooster komt uit RostarCAS (Trigion Schiphol). De privé feed-URL staat
            // BEWUST NIET in deze client-code: een GitHub Action haalt de feed server-side
            // op (met de URL in een beveiligde secret) en schrijft het resultaat naar
            // ./schedule.ics naast dit dashboard. De browser laadt dat same-origin.
            const poolScheduleUrl = "https://victoriabad.nl/tijden-en-tarieven/";
            
            const poolSchedule = {
                0: { times: ["09:30 - 14:00"], label: "Zondag", isOpen: true },
                1: { times: [], label: "Maandag", isOpen: false },
                2: { times: ["10:00 - 13:00", "19:30 - 21:00"], label: "Dinsdag", isOpen: true },
                3: { times: ["09:00 - 13:00", "19:00 - 21:00"], label: "Woensdag", isOpen: true },
                4: { times: ["10:00 - 13:00"], label: "Donderdag", isOpen: true },
                5: { times: ["09:00 - 13:00"], label: "Vrijdag", isOpen: true },
                6: { times: ["09:00 - 13:00"], label: "Zaterdag", isOpen: true }
            };

            // SALARISDAGEN (RVNB 2026-2027)
            const salaryDays = {
                // 2026
                '2026-01-28': { periode: 1, jaar: 2026 },
                '2026-02-25': { periode: 2, jaar: 2026 },
                '2026-03-25': { periode: 3, jaar: 2026 },
                '2026-04-22': { periode: 4, jaar: 2026, note: 'Vak' },
                '2026-05-20': { periode: 5, jaar: 2026 },
                '2026-06-17': { periode: 6, jaar: 2026 },
                '2026-07-15': { periode: 7, jaar: 2026 },
                '2026-08-12': { periode: 8, jaar: 2026 },
                '2026-09-09': { periode: 9, jaar: 2026 },
                '2026-10-07': { periode: 10, jaar: 2026 },
                '2026-11-04': { periode: 11, jaar: 2026, note: 'Bonus' },
                '2026-12-02': { periode: 12, jaar: 2026 },
                '2027-01-06': { periode: 13, jaar: 2026, note: 'incl wk 53' },
                // 2027
                '2027-02-03': { periode: 1, jaar: 2027 },
                '2027-03-03': { periode: 2, jaar: 2027 },
                '2027-03-31': { periode: 3, jaar: 2027 },
            };

            // Helper: Calculate days sober for a specific date based on history
            const getDaySoberCount = (dateToCheck) => {
                const checkTime = dateToCheck.getTime();
                for (const period of sobrietyHistory) {
                    const startTime = period.start.getTime();
                    const endTime = period.end ? period.end.getTime() : Infinity;
                    if (checkTime >= startTime && checkTime <= endTime) {
                        const diffTime = checkTime - startTime;
                        const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                        return days + 1; 
                    }
                }
                return 0;
            };

            // Helper: Check if a date is an Arm Training day based on history
            const isArmTrainingDay = (dateToCheck) => {
                const checkTime = dateToCheck.getTime();
                for (const period of armHistory) {
                    const startTime = period.start.getTime();
                    const endTime = period.end ? period.end.getTime() : Infinity;
                    const cycleLen = period.cycle || 3; 
                    
                    if (checkTime >= startTime && checkTime <= endTime) {
                        const diffTime = Math.floor((checkTime - startTime) / (1000 * 60 * 60 * 24));
                        if (diffTime >= 0 && diffTime % cycleLen === 0) {
                            return true;
                        }
                    }
                }
                return false;
            };

            // Helper: Bereken de LAATSTE trainingsdag op basis van het huidige schema
            const getLastScheduledArmDate = () => {
                const currentPeriod = armHistory[armHistory.length - 1];
                const startDate = currentPeriod.start;
                const cycleLen = currentPeriod.cycle || 3;
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                const diffTime = startOfToday.getTime() - startDate.getTime();
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays < 0) return startDate; 
                
                const daysSinceTraining = diffDays % cycleLen;
                
                const lastTrainingDate = new Date(startOfToday);
                lastTrainingDate.setDate(startOfToday.getDate() - daysSinceTraining);
                
                return lastTrainingDate;
            };

            const openArmSettings = () => {
                const lastDate = getLastScheduledArmDate();
                setNewArmStartDate(toLocalISOString(lastDate));
                setNewArmCycle(activeArmPeriod.cycle || 3);
                setShowArmSettingsModal(true);
            };

            useEffect(() => {
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                // 1. Sobriety Calculation
                const currentSoberStreak = sobrietyHistory[sobrietyHistory.length - 1];
                if (currentSoberStreak) {
                    const diffTime = startOfToday - currentSoberStreak.start;
                    const days = diffTime >= 0 ? Math.floor(diffTime / (1000 * 60 * 60 * 24)) : 0;
                    setDaysSoberToday(days);
                }

                // 2. Arm Status
                const currentArmPeriod = armHistory[armHistory.length - 1];
                if (currentArmPeriod) {
                    const armStartDate = currentArmPeriod.start;
                    const cycleLen = currentArmPeriod.cycle || 3;
                    const diffArmTime = Math.floor((startOfToday.getTime() - armStartDate.getTime()) / (1000 * 60 * 60 * 24));
                    const dayInCycle = diffArmTime >= 0 ? diffArmTime % cycleLen : -1;
                    
                    if (diffArmTime < 0) {
                        setArmStatus("Start binnenkort");
                    } else if (dayInCycle === 0) {
                        setArmStatus("VANDAAG TRAINEN!");
                    } else {
                        const daysLeft = cycleLen - dayInCycle;
                        setArmStatus(`Rustdag (Nog ${daysLeft} dag${daysLeft > 1 ? 'en' : ''})`);
                    }
                }

                // 3. Minoxidil Calculation
                const diffMinox = Math.floor((startOfToday - minoxStartDate) / (1000 * 60 * 60 * 24));
                if (diffMinox >= 0) {
                    const weeks = Math.floor(diffMinox / 7);
                    const days = diffMinox % 7;
                    setMinoxDisplay(`${weeks} weken, ${days} dagen`);
                } else {
                    setMinoxDisplay("Start binnenkort");
                }

                // Save to local storage
                localStorage.setItem('sobriety_history', JSON.stringify(sobrietyHistory));
                localStorage.setItem('arm_history', JSON.stringify(armHistory));
                localStorage.setItem('minox_start_date', minoxStartDate.toISOString());

                const saved = localStorage.getItem('dashboard_manual_shifts');
                if (saved) {
                    try {
                        setManualShifts(JSON.parse(saved));
                        setSaveStatus("Lokale kopie geladen");
                    } catch (e) { console.error("Fout laden data", e); }
                }

                fetchAndParseICS();
            }, [sobrietyHistory, armHistory, minoxStartDate]);

            // Save Amber shifts to localStorage + auto-save
            useEffect(() => {
                localStorage.setItem('amber_shifts', JSON.stringify(amberShifts));
            }, [amberShifts]);

            // Save Tijdvak shifts to localStorage
            useEffect(() => {
                localStorage.setItem('tijdvak_shifts', JSON.stringify(tijdvakShifts));
            }, [tijdvakShifts]);

            // Save calendar filters to localStorage
            useEffect(() => {
                localStorage.setItem('calendar_filters', JSON.stringify(calendarFilters));
            }, [calendarFilters]);

            // --- SETTINGS HANDLERS ---
            const handleCorrectSoberDate = () => {
                const newDate = new Date(newSoberStartDate + "T00:00:00");
                if (isNaN(newDate)) return;
                const updatedHistory = [...sobrietyHistory];
                updatedHistory[updatedHistory.length - 1].start = newDate;
                setSobrietyHistory(updatedHistory);
                setShowSoberSettingsModal(false);
            };

            const handleRelapseSoberDate = () => {
                const newDate = new Date(newSoberStartDate + "T00:00:00");
                if (isNaN(newDate)) return;
                const updatedHistory = [...sobrietyHistory];
                const lastIdx = updatedHistory.length - 1;
                const prevEndDate = new Date(newDate);
                prevEndDate.setDate(prevEndDate.getDate() - 1);
                
                if (prevEndDate < updatedHistory[lastIdx].start) {
                    alert("De nieuwe startdatum moet na de vorige startdatum liggen.");
                    return;
                }
                updatedHistory[lastIdx].end = prevEndDate;
                updatedHistory.push({ start: newDate, end: null });
                setSobrietyHistory(updatedHistory);
                setShowSoberSettingsModal(false);
            };

            const handleCorrectArmDate = () => {
                const newDate = new Date(newArmStartDate + "T00:00:00");
                if (isNaN(newDate)) return;
                const updatedHistory = [...armHistory];
                const lastIdx = updatedHistory.length - 1;
                
                updatedHistory[lastIdx].start = newDate;
                updatedHistory[lastIdx].cycle = parseInt(newArmCycle);
                
                setArmHistory(updatedHistory);
                setShowArmSettingsModal(false);
            };

            const handleNewArmCycle = () => {
                const newDate = new Date(newArmStartDate + "T00:00:00");
                if (isNaN(newDate)) return;
                
                const updatedHistory = [...armHistory];
                const lastIdx = updatedHistory.length - 1;
                const lastScheduled = getLastScheduledArmDate();
                
                let prevEndDate;

                if (newDate > lastScheduled) {
                    prevEndDate = new Date(lastScheduled);
                    prevEndDate.setDate(prevEndDate.getDate() - 1);
                } else {
                    prevEndDate = new Date(newDate);
                    prevEndDate.setDate(prevEndDate.getDate() - 1);
                }

                if (prevEndDate < updatedHistory[lastIdx].start) {
                    updatedHistory[lastIdx].start = newDate;
                    updatedHistory[lastIdx].cycle = parseInt(newArmCycle);
                } else {
                    updatedHistory[lastIdx].end = prevEndDate;
                    updatedHistory.push({ start: newDate, end: null, cycle: parseInt(newArmCycle) });
                }

                setArmHistory(updatedHistory);
                setShowArmSettingsModal(false);
            };

            const handleMinoxDateChange = () => {
                const newDate = new Date(newMinoxStartDateInput + "T00:00:00");
                if (isNaN(newDate)) return;
                setMinoxStartDate(newDate);
                setShowMinoxSettingsModal(false);
            };


            // --- FILE SYSTEM ACCESS API LOGICA ---
            const handleSaveAs = async () => {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'mijn_herstel_dashboard.json',
                        types: [{
                            description: 'JSON Data Bestand',
                            accept: {'application/json': ['.json']},
                        }],
                    });
                    setFileHandle(handle);
                    const exportData = {
                        shifts: manualShifts,
                        sobriety: sobrietyHistory,
                        armHistory: armHistory,
                        minoxStart: minoxStartDate,
                        amberShifts: amberShifts,
                        tijdvakShifts: tijdvakShifts
                    };
                    await writeToFile(handle, exportData);
                } catch (err) {
                    console.error("Opslaan geannuleerd:", err);
                }
            };

            const handleOpenFile = async () => {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'JSON Data Bestand',
                            accept: {'application/json': ['.json']},
                        }],
                        multiple: false
                    });
                    
                    const file = await handle.getFile();
                    const contents = await file.text();
                    const data = JSON.parse(contents);
                    
                    if (data.shifts) {
                        setManualShifts(data.shifts);
                        if(data.sobriety) setSobrietyHistory(data.sobriety.map(p => ({ start: new Date(p.start), end: p.end ? new Date(p.end) : null })));
                        if(data.armHistory) {
                            setArmHistory(data.armHistory.map(p => ({ start: new Date(p.start), end: p.end ? new Date(p.end) : null, cycle: p.cycle || 3 })));
                        } else if(data.armStart) {
                            setArmHistory([{ start: new Date(data.armStart), end: null, cycle: 3 }]);
                        }
                        if(data.minoxStart) setMinoxStartDate(new Date(data.minoxStart));
                        if(data.amberShifts) setAmberShifts(data.amberShifts);
                        if(data.tijdvakShifts) setTijdvakShifts(data.tijdvakShifts);
                    } else {
                        setManualShifts(data);
                    }

                    setFileHandle(handle);
                    setSaveStatus("Gekoppeld & Ingeladen");
                    localStorage.setItem('dashboard_manual_shifts', JSON.stringify(data.shifts || data));
                    if(data.amberShifts) localStorage.setItem('amber_shifts', JSON.stringify(data.amberShifts));
                    if(data.tijdvakShifts) localStorage.setItem('tijdvak_shifts', JSON.stringify(data.tijdvakShifts));
                    
                } catch (err) {
                    console.error("Openen geannuleerd of mislukt:", err);
                }
            };

            const writeToFile = async (handle, data) => {
                if (!handle) return;
                try {
                    setSaveStatus("Aan het opslaan...");
                    const writable = await handle.createWritable();
                    await writable.write(JSON.stringify(data, null, 2));
                    await writable.close();
                    setSaveStatus("Bestand bijgewerkt");
                } catch (err) {
                    console.error("Fout bij wegschrijven:", err);
                    setSaveStatus("Fout bij opslaan bestand!");
                }
            };

            const saveData = (newShifts) => {
                setManualShifts(newShifts);
                localStorage.setItem('dashboard_manual_shifts', JSON.stringify(newShifts));

                const exportData = {
                    shifts: newShifts,
                    sobriety: sobrietyHistory,
                    armHistory: armHistory,
                    minoxStart: minoxStartDate,
                    amberShifts: amberShifts,
                    tijdvakShifts: tijdvakShifts
                };

                if (fileHandle) {
                    writeToFile(fileHandle, exportData);
                } else {
                    setSaveStatus("Alleen lokaal (browser)");
                }
            };

            // --- KALENDER LOGICA ---
            const handleDeleteShift = (dateKey, id) => {
                const updatedShifts = { ...manualShifts };
                if (updatedShifts[dateKey]) {
                    updatedShifts[dateKey] = updatedShifts[dateKey].filter(s => s.id !== id);
                    if (updatedShifts[dateKey].length === 0) delete updatedShifts[dateKey];
                    saveData(updatedShifts);
                }
            };

            const cleanSummary = (summary) => {
                if (!summary) return "";
                const cleaned = summary.replace(/^\d{1,2}:\d{2}\s*[-–]\s*\d{1,2}:\d{2}\s*/, '').trim();
                if (cleaned.toLowerCase().includes('verlof naar rato')) return 'Verlof';
                return cleaned;
            };

            const parseICS = (icsData) => {
                const events = {};
                const lines = icsData.split(/\r\n|\n|\r/);
                let currentEvent = null;

                const parseDate = (dateStr) => {
                    if (!dateStr) return null;
                    const clean = dateStr.trim();
                    const y = parseInt(clean.substring(0, 4)), m = parseInt(clean.substring(4, 6)) - 1, d = parseInt(clean.substring(6, 8));
                    
                    if (clean.includes('T')) {
                        const h = parseInt(clean.substring(9, 11));
                        const min = parseInt(clean.substring(11, 13));
                        const date = new Date(Date.UTC(y, m, d, h, min));
                        return date;
                    }
                    return new Date(y, m, d);
                };

                lines.forEach(line => {
                    if (line.startsWith('BEGIN:VEVENT')) currentEvent = { status: 'CONFIRMED' };
                    else if (line.startsWith('END:VEVENT')) {
                        if (currentEvent?.start) {
                            const key = currentEvent.start.toLocaleDateString('en-CA');
                            if (!events[key]) events[key] = [];
                            events[key].push(currentEvent);
                        }
                        currentEvent = null;
                    } else if (currentEvent) {
                        if (line.startsWith('DTSTART')) currentEvent.start = parseDate(line.split(':')[1]);
                        else if (line.startsWith('DTEND')) currentEvent.end = parseDate(line.split(':')[1]);
                        else if (line.startsWith('SUMMARY')) currentEvent.summary = line.substring(8);
                    }
                });
                return events;
            };

            const fetchAndParseICS = async () => {
                setLoadingShifts(true);
                try {
                    // Same-origin laden: schedule.ics wordt server-side ververst door de
                    // GitHub Action (RostarCAS -> schedule.ics). Geen CORS, geen proxy.
                    // Cache-buster zodat we altijd de nieuwste versie krijgen.
                    const res = await fetch(`./schedule.ics?t=${Date.now()}`, { cache: "no-store" });
                    if (!res.ok) throw new Error("schedule.ics niet gevonden");
                    const txt = await res.text();
                    if (!txt.includes("BEGIN:VCALENDAR")) throw new Error("Geen geldige kalender");
                    const parsedShifts = parseICS(txt);
                    setOrtecShifts(parsedShifts);

                    // Verwijder voorlopige tijdvakken tot en met de laatste definitieve roosterdatum
                    const shiftDates = Object.keys(parsedShifts);
                    if (shiftDates.length > 0) {
                        const latestDate = shiftDates.reduce((latest, current) => current > latest ? current : latest);
                        setTijdvakShifts(prev => {
                            const updated = { ...prev };
                            let removed = 0;
                            Object.keys(updated).forEach(dateKey => {

            const moonDatesCache = (() => {
                const cache = {};
                // Bekende nieuwe maan: 29 januari 2025 12:36 UTC
                const knownNewMoon = Date.UTC(2025, 0, 29, 12, 36);
                const synodicMonth = 29.53058867 * 24 * 60 * 60 * 1000; // in milliseconden

                // Bereken alle nieuwe en volle manen van 2025-2050
                const startDate = new Date(2025, 0, 1).getTime();
                const endDate = new Date(2050, 11, 31).getTime();

                // Vind eerste nieuwe maan voor 2025
                let newMoonTime = knownNewMoon;
                while (newMoonTime > startDate) newMoonTime -= synodicMonth;
                while (newMoonTime < startDate) newMoonTime += synodicMonth;

                // Genereer alle nieuwe manen
                while (newMoonTime <= endDate) {
                    const d = new Date(newMoonTime);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    cache[key] = '🌑';
                    newMoonTime += synodicMonth;
                }

                // Genereer alle volle manen (halverwege tussen nieuwe manen)
                let fullMoonTime = knownNewMoon + (synodicMonth / 2);
                while (fullMoonTime > startDate) fullMoonTime -= synodicMonth;
                while (fullMoonTime < startDate) fullMoonTime += synodicMonth;

                while (fullMoonTime <= endDate) {
                    const d = new Date(fullMoonTime);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    cache[key] = '🌕';
                    fullMoonTime += synodicMonth;
                }

                return cache;

                    }) : [];

                    const swimInfo = poolSchedule[dayOfWeek];
                    const swimEvents = [];
                    if (swimInfo.isOpen && calendarFilters.showSwimming) {
                        swimInfo.times.forEach(tStr => {
                            const allWorkShifts = [...finalOrtec, ...manualDay];
                            if (!isSwimTimeConflict(tStr, allWorkShifts, date)) {
                                const [startStr, endStr] = tStr.split(' - ');
                                const [h1, m1] = startStr.split(/[:.]/).map(Number);
                                const [h2, m2] = endStr.split(/[:.]/).map(Number);
                                const start = new Date(date); start.setHours(h1, m1);
                                const end = new Date(date); end.setHours(h2, m2);
                                swimEvents.push({ type: 'swim', summary: tStr, sortStart: start, sortEnd: end });
                            }
                        });
                    }

                    const allEvents = [...finalOrtec, ...manualDay, ...swimEvents].sort((a, b) => {
                        // Notities altijd bovenaan
                        if (a.isNote && !b.isNote) return -1;
                        if (!a.isNote && b.isNote) return 1;
                        // Daarna op tijd sorteren
                        return a.sortStart - b.sortStart;
                    });
                    const isToday = currentDate.toDateString() === date.toDateString();
                    
                    // Check voor werk: Ortec diensten, handmatige shifts, OF G4S tijdvakken
                    const hasWork = allEvents.some(e => (e.type === 'ortec' || (e.type === 'manual' && !e.isNote))) ||
                                   (manualShifts[dateKey] || []).some(s => s.isG4SShift); // Ook checken voor verborgen G4S tijdvakken
                    const isOnlyVerlof = hasWork && allEvents.every(e => e.type !== 'swim' && e.summary?.toLowerCase().includes('verlof'));

                    // Check of er een definitieve dienst is (Ortec of PDF import)
                    const hasDefinitiveShift = finalOrtec.length > 0 || (manualShifts[dateKey] || []).some(s => s.isG4SShift);

                    // Bepaal of tijdvak getoond moet worden (alleen als er GEEN definitieve dienst is)
                    const showTijdvak = tijdvakShift && !hasDefinitiveShift;

                    let bgClass = "bg-emerald-50 border-emerald-200";
                    if (hasWork && !isOnlyVerlof) bgClass = "bg-red-50 border-red-200";
                    // Tijdvak zonder definitieve dienst: amber gestippelde achtergrond
                    if (showTijdvak && !hasWork) bgClass = "bg-amber-50 border-amber-300 border-dashed";
                    if (isToday) bgClass = "bg-blue-50 ring-2 ring-blue-400"; 

                    days.push(
                        <div key={day} className={`h-36 border p-1 relative flex flex-col ${bgClass} group transition-colors`}>
                            <div className="flex justify-between items-start mb-1">
                                <span className={`text-sm font-bold ${isToday ? 'text-blue-600' : (hasWork && !isOnlyVerlof ? 'text-red-700' : 'text-emerald-700')}`}>{day}{getMoonPhase(date) && <span className="ml-1 text-xs" title={getMoonPhase(date) === '🌑' ? 'Nieuwe maan' : 'Volle maan'}>{getMoonPhase(date)}</span>}</span>
                                {isToday && <span className="text-[10px] bg-blue-600 text-white px-1 rounded">Vandaag</span>}
                                <button onClick={() => { setSelectedDate(dateKey); setNewNote(""); setShowAddModal(true); }} className="opacity-0 group-hover:opacity-100 text-blue-500 p-0.5 hover:bg-white/50 rounded"><Plus size={14}/></button>
                            </div>
                            
                            <div className="flex-1 flex flex-col gap-1 overflow-y-auto custom-scrollbar">
                                {/* 1. NOTITIES EERST */}
                                {allEvents.filter(e => e.isNote).map((e) => (
                                    <div key={`m-${e.id}`} className="text-[10px] font-bold p-1 rounded border border-gray-200 mb-0.5 flex justify-between items-start group/item bg-white shadow-sm text-black w-full text-left">
                                        <span className="break-words w-full leading-tight">{e.summary}</span>
                                        <button onClick={(ev)=>{ev.stopPropagation(); handleDeleteShift(dateKey, e.id)}} className="opacity-0 group-hover/item:opacity-100 text-gray-400 hover:text-red-500 ml-1 shrink-0"><Trash2 size={10}/></button>
                                    </div>
                                ))}

                                {/* 2. AMBER'S SHIFT */}
                                {amberShift && (
                                    <div className="flex items-center justify-between text-[9px] text-pink-700 bg-pink-50 p-0.5 rounded border border-pink-200 w-full group/amber">
                                        <div className="flex items-center">
                                            <Heart size={10} className="mr-1 fill-pink-300"/>
                                            <span className="font-medium">Amber {amberShift.startTime}-{amberShift.endTime}</span>
                                        </div>
                                        <button onClick={(ev) => { ev.stopPropagation(); deleteAmberShift(dateKey); }} className="opacity-0 group-hover/amber:opacity-100 text-pink-500 hover:text-pink-700"><Trash2 size={10}/></button>
                                    </div>
                                )}

                                {/* 2.25 TIJDVAK (voorlopig rooster) - alleen tonen als geen definitieve dienst */}
                                {showTijdvak && (
                                    <div className="flex items-center justify-between text-[9px] text-amber-700 bg-amber-50 p-0.5 rounded border-2 border-dashed border-amber-400 w-full group/tijdvak">
                                        <div className="flex items-center">
                                            <Clock size={10} className="mr-1"/>
                                            <span className="font-medium">Tijdvak {tijdvakShift.startTime}-{tijdvakShift.endTime}</span>
                                        </div>
                                        <button onClick={(ev) => { ev.stopPropagation(); deleteTijdvakShift(dateKey); }} className="opacity-0 group-hover/tijdvak:opacity-100 text-amber-500 hover:text-amber-700"><Trash2 size={10}/></button>
                                    </div>
                                )}

                                {/* 2.5 SALARISDAG */}
                                {salaryDay && (
                                    <div className="flex items-center text-[9px] text-yellow-800 bg-yellow-100 p-0.5 rounded border border-yellow-300 w-full font-bold">
                                        <span className="mr-1">💰</span>
                                        <span>Salaris P{salaryDay.periode}{salaryDay.note ? ` (${salaryDay.note})` : ''}</span>
                                    </div>
                                )}

                                {/* 3. REST VAN DE EVENTS (geen notities) */}
                                {allEvents.filter(e => !e.isNote).map((e, idx) => {
                                    if (e.type === 'swim') {
                                        return (
                                            <div key={`s-${idx}`} className="flex flex-col items-start text-[9px] text-blue-700 bg-white/80 p-1 rounded border border-blue-100 mb-0.5 w-full text-left shadow-sm">
                                                <div className="flex items-center font-bold mb-0.5"><Droplets size={8} className="mr-1"/> <span>Zwemmen</span></div>
                                                <span className="font-medium block">{e.summary}</span>
                                            </div>
                                        );
                                    }
                                    if (e.type === 'ortec') {
                                        const isVerlof = e.summary?.toLowerCase().includes('verlof');
                                        const txt = cleanSummary(e.summary);
                                        return (
                                            <div key={`o-${idx}`} className="text-[9px] p-1 rounded bg-white shadow-sm text-purple-800 border border-purple-200 mb-0.5 w-full text-left">
                                                <div className="font-bold flex items-center"><Briefcase size={8} className="mr-1"/> {isVerlof ? "Verlof" : `${formatTime(e.sortStart)} - ${formatTime(e.sortEnd)}`}</div>
                                                {!isVerlof && txt && <div className="truncate opacity-80">{txt}</div>}
                                            </div>
                                        );
                                    }
                                    if (e.type === 'manual') {
                                        // G4S Geïmporteerde tijdvak (voorlopig, wordt overschreven door echte dienst)
                                        if (e.isG4SShift) {
                                            return (
                                                <div key={`m-${e.id}`} className="text-[9px] p-1 rounded border-2 border-dashed mb-0.5 flex justify-between items-center group/item bg-amber-50/50 text-amber-700 border-amber-300 w-full text-left">
                                                    <div className="overflow-hidden w-full">
                                                        <div className="font-bold flex items-center gap-1">
                                                            <Clock size={8}/> Tijdvak: {e.summary.replace('Dienst ', '')}
                                                        </div>
                                                        <div className="text-[8px] opacity-70 italic">Wacht op definitieve dienst...</div>
                                                    </div>
                                                    <button onClick={(ev)=>{ev.stopPropagation(); handleDeleteShift(dateKey, e.id)}} className="opacity-0 group-hover/item:opacity-100 text-red-500 ml-1 shrink-0"><Trash2 size={10}/></button>
                                                </div>
                                            );
                                        }
                                        // Handmatige shift (geen notitie, geen G4S)
                                        return (
                                            <div key={`m-${e.id}`} className="text-[9px] p-1 rounded border mb-0.5 flex justify-between items-center group/item bg-white shadow-sm text-orange-800 border-orange-200 w-full text-left">
                                                <div className="overflow-hidden w-full">
                                                    <div className="font-bold">{e.startTime} - {e.endTime}</div>
                                                    <div className="truncate opacity-80">{e.summary}</div>
                                                </div>
                                                <button onClick={(ev)=>{ev.stopPropagation(); handleDeleteShift(dateKey, e.id)}} className="opacity-0 group-hover/item:opacity-100 text-red-500 ml-1 shrink-0"><Trash2 size={10}/></button>
                                            </div>
                                        );
                                    }
                                    return null;
                                })}
                                
                                {/* 4. TRACKING INDICATORS ONDERAAN */}
                                {daySoberCount > 0 && <div className={`flex items-center text-[9px] ${currentDate.toDateString() === date.toDateString() ? "text-white bg-green-600 border-green-600 font-bold" : "text-green-700 bg-white/50 border-green-100"} p-0.5 rounded border w-full mt-auto transition-colors`}><CheckCircle size={10} className="mr-1"/> Dag {daySoberCount}</div>}
                                {isArmDay && <div className="flex items-center text-[9px] text-red-700 font-bold bg-white/50 p-0.5 rounded border border-red-100 w-full"><Activity size={10} className="mr-1"/> Armen</div>}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="max-w-6xl mx-auto p-4 font-sans min-h-screen relative">
                    <div className="bg-white rounded-xl shadow-sm p-6 mb-6 border-l-4 border-blue-500 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">Mijn Herstel Dashboard</h1>
                            <div className="flex items-center gap-2 mt-1">
                                <p className="text-gray-600 text-sm">Notities & Automatisch Rooster</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 flex-wrap">
                            {/* FILTER KNOP */}
                            <button onClick={() => setShowFilters(!showFilters)} className={`flex items-center text-xs px-3 py-1.5 rounded-lg font-bold transition-colors ${showFilters ? 'bg-purple-600 text-white' : 'bg-purple-100 text-purple-700 hover:bg-purple-200'}`}>
                                <Filter size={14} className="mr-1.5"/> Filters
                            </button>
                            {/* TIJDVAK ROOSTER UPLOAD */}
                            <button onClick={openTijdvakModal} className="flex items-center text-xs bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg hover:bg-amber-200 font-bold transition-colors">
                                <Clock size={14} className="mr-1.5"/> Tijdvakken
                            </button>
                            {/* OPSLAAN ALS */}
                            <button onClick={handleSaveAs} className="flex items-center text-xs bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200 font-bold transition-colors">
                                <FileJson size={14} className="mr-1.5"/> Opslaan als...
                            </button>
                            {/* BESTAND OPENEN */}
                            <button onClick={handleOpenFile} className="flex items-center text-xs bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg hover:bg-emerald-200 font-bold transition-colors">
                                <FolderOpen size={14} className="mr-1.5"/> Bestand Openen
                            </button>
                            {/* STATUS INDICATOR */}
                            <div className={`flex items-center text-xs px-3 py-1.5 rounded-full ${fileHandle ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-500'}`}>
                                <HardDrive size={14} className="mr-1.5"/>
                                {saveStatus}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        {/* DAGEN NUCHTER KPI */}
                        <div className="bg-white p-5 rounded-xl border border-green-100 flex flex-col items-center">
                            <Trophy className="text-green-600 mb-2" size={24}/>
                            <h2 className="text-xs font-bold text-gray-500">Dagen Nuchter</h2>
                            <p className="text-3xl font-extrabold text-green-600">{daysSoberToday}</p>
                            <button onClick={() => setShowSoberSettingsModal(true)} className="mt-3 inline-flex items-center text-xs font-semibold text-gray-600 hover:text-green-800 transition-colors">
                                <Settings size={14} className="mr-1"/> Startdatum Aanpassen
                            </button>
                        </div>
                        
                        {/* ARM TRAINING KPI */}
                        <div className="bg-white p-5 rounded-xl border border-red-100 flex flex-col items-center">
                            <Activity className="text-red-600 mb-2" size={24}/>
                            <h2 className="text-xs font-bold text-gray-500">Arm Training</h2>
                            <p className={`text-xl font-bold ${armStatus.includes("TRAINEN") ? "text-red-600 animate-pulse" : "text-gray-700"}`}>{armStatus}</p>
                            <button onClick={openArmSettings} className="mt-3 inline-flex items-center text-xs font-semibold text-gray-600 hover:text-red-800 transition-colors">
                                <Settings size={14} className="mr-1"/> Pas Trainingscyclus Aan
                            </button>
                        </div>

                        {/* ZWEMMEN KPI */}
                        <div className="bg-white p-5 rounded-xl border border-blue-100 flex flex-col items-center text-center">
                            <Droplets className="text-blue-600 mb-2" size={24}/>
                            <h2 className="text-xs font-bold text-gray-500 mb-1">Victoriabad Vandaag</h2>
                            {poolSchedule[currentDate.getDay()].isOpen ? (
                                <div className="space-y-1">
                                    {poolSchedule[currentDate.getDay()].times.map((t, i) => (
                                        <p key={i} className="text-lg font-bold text-blue-600">{t}</p>
                                    ))}
                                </div>
                            ) : (
                                <p className="text-xl font-bold text-gray-400">Gesloten</p>
                            )}
                            <a href={poolScheduleUrl} target="_blank" rel="noopener noreferrer" className="mt-3 inline-flex items-center text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors">
                                <ExternalLink size={14} className="mr-1"/> Check Tijden Website
                            </a>
                        </div>

                        {/* MINOXIDIL KPI (NIEUW) */}
                        <div className="bg-white p-5 rounded-xl border border-purple-100 flex flex-col items-center">
                            <FlaskConical className="text-purple-600 mb-2" size={24}/>
                            <h2 className="text-xs font-bold text-gray-500">Minoxidil Voortgang</h2>
                            <p className="text-lg font-extrabold text-purple-600 text-center">{minoxDisplay}</p>
                            <button onClick={() => setShowMinoxSettingsModal(true)} className="mt-3 inline-flex items-center text-xs font-semibold text-gray-600 hover:text-purple-800 transition-colors">
                                <Settings size={14} className="mr-1"/> Startdatum Aanpassen
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-lg border border-gray-200">
                        <div className="p-4 bg-gray-800 text-white flex justify-between items-center">
                            <button onClick={prevM} className="p-2 hover:bg-gray-700 rounded-full"><ChevronLeft/></button>
                            <h2 className="text-lg font-bold flex items-center gap-2"><CalendarIcon/> {mNames[viewDate.getMonth()]} {viewDate.getFullYear()}</h2>
                            <button onClick={nextM} className="p-2 hover:bg-gray-700 rounded-full"><ChevronRight/></button>
                        </div>
                        <div className="grid grid-cols-7 bg-gray-100 text-center py-3 text-xs font-bold text-gray-500 border-b"><div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div></div>
                        <div className="grid grid-cols-7 bg-gray-200 gap-px">{renderCalendar()}</div>
                    </div>

                    {/* MODAL: Notitie Toevoegen */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-sm shadow-2xl">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2"><StickyNote size={20}/> Notitie Toevoegen</h3>
                                    <button onClick={() => setShowAddModal(false)}><X className="text-gray-400 hover:text-gray-600"/></button>
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Inhoud</label>
                                        <textarea 
                                            className="w-full border p-3 rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none min-h-[100px]" 
                                            placeholder="Typ hier je notitie..." 
                                            value={newNote} 
                                            onChange={e => setNewNote(e.target.value)}
                                            autoFocus
                                        />
                                    </div>
                                </div>

                                <div className="flex justify-end gap-2 mt-6 pt-4 border-t">
                                    <button onClick={() => setShowAddModal(false)} className="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Annuleren</button>
                                    <button onClick={handleAddNote} className="px-4 py-2 text-sm font-bold bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm flex items-center gap-2"><Save size={16}/> Opslaan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Dagen Nuchter Instellingen */}
                    {showSoberSettingsModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-sm shadow-2xl">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2"><Settings size={20}/> Nuchterheid Instellen</h3>
                                    <button onClick={() => setShowSoberSettingsModal(false)}><X className="text-gray-400 hover:text-gray-600"/></button>
                                </div>
                                
                                <p className="text-sm text-gray-600 mb-4">
                                    Kies een nieuwe startdatum.
                                </p>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Nieuwe Startdatum</label>
                                        <input 
                                            type="date" 
                                            className="w-full border p-3 rounded text-sm focus:ring-2 focus:ring-green-500 outline-none" 
                                            value={newSoberStartDate} 
                                            onChange={e => setNewSoberStartDate(e.target.value)}
                                        />
                                    </div>
                                    <div className="bg-green-50 p-3 rounded text-xs text-green-700 border border-green-200">
                                        <p>Huidige reeks gestart op: **{activeSoberPeriod.start.toLocaleDateString('nl-NL', { dateStyle: 'medium' })}**</p>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-2 mt-6 pt-4 border-t">
                                    <button onClick={handleCorrectSoberDate} className="w-full px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors flex items-center justify-center gap-2">
                                        <RefreshCw size={16}/> Datum Corrigeren <span className="text-[10px] opacity-70">(Overschrijft huidige start)</span>
                                    </button>
                                    <button onClick={handleRelapseSoberDate} className="w-full px-4 py-2 text-sm font-bold bg-green-600 text-white rounded-lg hover:bg-green-700 shadow-sm flex items-center justify-center gap-2">
                                        <History size={16}/> Opnieuw Beginnen <span className="text-[10px] opacity-70">(Behoudt historie)</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Arm Training Instellingen (UPDATED) */}
                    {showArmSettingsModal && (

                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2"><Settings size={20}/> Trainingscyclus Aanpassen</h3>
                                    <button onClick={() => setShowArmSettingsModal(false)}><X className="text-gray-400 hover:text-gray-600"/></button>
                                </div>
                                
                                <p className="text-sm text-gray-600 mb-4">Kies de <strong>nieuwe startdatum</strong> en de gewenste <strong>cyclusduur</strong>.</p>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Nieuwe Startdatum (Eerste trainingsdag)</label>
                                        <input 
                                            type="date" 
                                            className="w-full border p-3 rounded text-sm focus:ring-2 focus:ring-red-500 outline-none" 
                                            value={newArmStartDate} 
                                            onChange={e => setNewArmStartDate(e.target.value)}

                                    </div>
                                    
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Cyclus Lengte</label>
                                        <select 
                                            className="w-full border p-3 rounded text-sm focus:ring-2 focus:ring-red-500 outline-none bg-white"

                                            onChange={e => setNewArmCycle(e.target.value)}

                                            <option value="3">3 Dagen (Trainen, Rust, Rust)</option>

                                        </select>
                                    </div>

                                    <div className="bg-red-50 p-3 rounded text-xs text-red-700 border border-red-200">
                                        <p>Huidige cyclus gestart op: **{activeArmPeriod.start.toLocaleDateString('nl-NL', { dateStyle: 'medium' })}** ({activeArmPeriod.cycle || 3} dagen)</p>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-2 mt-6 pt-4 border-t">

                                    </button>
                                    <button onClick={handleNewArmCycle} className="w-full px-4 py-2 text-sm font-bold bg-red-600 text-white rounded-lg hover:bg-red-700 shadow-sm flex items-center justify-center gap-2">
                                        <History size={16}/> Nieuwe Cyclus Starten <span className="text-[10px] opacity-70">(Behoudt historie)</span>
                                    </button>
                                </div>
                            </div>

                    {/* MODAL: Minoxidil Instellingen */}

                                    <button onClick={() => setShowMinoxSettingsModal(false)}><X className="text-gray-400 hover:text-gray-600"/></button>
                                </div>
                                
                                <p className="text-sm text-gray-600 mb-4">Wanneer ben je begonnen met de behandeling?</p>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Startdatum</label>
