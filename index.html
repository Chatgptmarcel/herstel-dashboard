    <!-- Astrologie Transit Data (uit astrologieprogramma) -->
    <script>
    window.ASTRO_TRANSITS = [];

    // Berekeningsconstanten
    window.ASTRO_PLANEET_ICONEN = {'Zon':'☉','Maan':'☽','Mercurius':'☿','Venus':'♀','Mars':'♂','Jupiter':'♃','Saturnus':'♄','Uranus':'♅','Neptunus':'♆','Pluto':'♇'};
    window.ASTRO_PLANEET_SNELHEID = {'Pluto':0.015,'Neptunus':0.020,'Uranus':0.040,'Saturnus':0.055,'Jupiter':0.083};
    window.ASTRO_PLANEET_ORB = {'Pluto':1.5,'Neptunus':1.5,'Uranus':2.0,'Saturnus':2.0,'Jupiter':2.0};
    window.ASTRO_PIEK_ORB = 0.5;
    window.ASTRO_LEVENSGEBIEDEN = {identiteit:{naam:'Identiteit',icon:'☉'},emoties:{naam:'Emoties',icon:'☽'},werk:{naam:'Werk',icon:'♄'},relaties:{naam:'Relaties',icon:'♀'},creativiteit:{naam:'Creativiteit',icon:'♇'},gezondheid:{naam:'Gezondheid',icon:'♅'},financien:{naam:'Financiën',icon:'☽'}};

    // Bereken actieve periodes per groep
    window.ASTRO_GROEP_PERIODES = {};
    (function() {
      const groepen = {};
      window.ASTRO_TRANSITS.forEach(t => {
        if (!groepen[t.groepId]) groepen[t.groepId] = [];
        groepen[t.groepId].push(t);
      });
      Object.entries(groepen).forEach(([groepId, passages]) => {
        const planeet = passages[0].transitplaneet;
        const snelheid = window.ASTRO_PLANEET_SNELHEID[planeet] || 0.05;
        const orb = window.ASTRO_PLANEET_ORB[planeet] || 2.0;
        const orbDagen = Math.round(orb / snelheid);
        passages.sort((a, b) => new Date(a.datum) - new Date(b.datum));
        const eersteHit = new Date(passages[0].datum);
        const laatsteHit = new Date(passages[passages.length - 1].datum);
        const startActief = new Date(eersteHit.getTime() - orbDagen * 86400000);
        const eindActief = new Date(laatsteHit.getTime() + orbDagen * 86400000);
        const piekDagen = Math.round(window.ASTRO_PIEK_ORB / snelheid);
        const pieken = passages.map(p => ({
          id: p.id, datum: new Date(p.datum),
          piekStart: new Date(new Date(p.datum).getTime() - piekDagen * 86400000),
          piekEind: new Date(new Date(p.datum).getTime() + piekDagen * 86400000)
        }));
        window.ASTRO_GROEP_PERIODES[groepId] = { startActief, eindActief, eersteHit, laatsteHit, orbDagen, piekDagen, pieken, passages };
      });
    })();

    // Bepaal transit status voor een datum
    window.getAstroTransitStatus = function(transit, datum) {
      const groep = window.ASTRO_GROEP_PERIODES[transit.groepId];
      if (!groep) return null;
      const d = datum.getTime();
      if (d < groep.startActief.getTime() || d > groep.eindActief.getTime()) return null;
      const snelheid = window.ASTRO_PLANEET_SNELHEID[transit.transitplaneet] || 0.05;
      let dichtstbijHit = null, minAfstand = Infinity;
      groep.pieken.forEach(p => {
        const afstand = Math.abs(p.datum.getTime() - d);
        if (afstand < minAfstand) { minAfstand = afstand; dichtstbijHit = p; }
      });
      let fase;
      if (dichtstbijHit && d >= dichtstbijHit.piekStart.getTime() && d <= dichtstbijHit.piekEind.getTime()) fase = 'piek';
      else if (d < groep.eersteHit.getTime()) fase = 'aanloop';
      else if (d > groep.laatsteHit.getTime()) fase = 'uitloop';
      else fase = (dichtstbijHit && d < dichtstbijHit.datum.getTime()) ? 'aanloop' : 'uitloop';
      const totaalDuur = groep.eindActief.getTime() - groep.startActief.getTime();
      const voortgang = Math.min(100, Math.max(0, Math.round(((d - groep.startActief.getTime()) / totaalDuur) * 100)));
      const dagenTotHit = dichtstbijHit ? Math.round((dichtstbijHit.datum.getTime() - d) / 86400000) : 0;
      const orbGraden = dichtstbijHit ? (Math.abs(dichtstbijHit.datum.getTime() - d) / 86400000 * snelheid).toFixed(1) : '?';
      return { actief: true, fase, voortgang, dagenTotHit, dichtstbijHit, orbGraden, groep };
    };
    </script>

<body class="text-slate-900" style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); min-height: 100vh;">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Calendar as CalendarIcon, 
            CheckCircle, 
            Activity, 
            Droplets, 
            Trophy, 
            ChevronLeft, 
            ChevronRight, 
            Plus, 
            X, 
            Save, 
            Trash2, 
            Briefcase, 
            StickyNote, 
            HardDrive,
            FileJson,
            FolderOpen,
            ExternalLink,
            Settings,
            History,
            RefreshCw,
            Clock,
            FlaskConical,
            Upload,
            FileText,
            AlertCircle,
            Check,
            Heart,
            Eye,
            EyeOff,
            Filter,
            Star,
            ChevronDown,
            ChevronUp,
            Sparkles,
            Zap,
            Download,
            Pencil
        } from 'lucide-react';

        /* ============================================================
           WK 2026 — weergave (leest wk-data.json, door sync/wk-sync.js
           gegenereerd uit openfootball). Alleen tonen; alle rekenwerk
           (standen, beste nummers 3) zit in het sync-script.
           ============================================================ */
        const WK_TZ = 'Europe/Amsterdam';
        const hoofdletter = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);
        const wkTijd = (utc) => utc ? new Date(utc).toLocaleTimeString('nl-NL', { timeZone: WK_TZ, hour: '2-digit', minute: '2-digit' }) : '';
        const wkDatumKort = (utc) => utc ? new Date(utc).toLocaleDateString('nl-NL', { timeZone: WK_TZ, weekday: 'short', day: 'numeric', month: 'short' }) : '';
        const wkDatumLang = (utc) => utc ? new Date(utc).toLocaleDateString('nl-NL', { timeZone: WK_TZ, weekday: 'long', day: 'numeric', month: 'long' }) : '';
        const wkDagSleutel = (utc) => utc ? new Date(utc).toLocaleDateString('en-CA', { timeZone: WK_TZ }) : ''; // YYYY-MM-DD, voor groeperen per dag

        // Statusbadge per wedstrijd (op dag-niveau; geen valse "live"-claim).
        const statusVan = (w) => {
            if (w.score) return { label: 'Afgelopen', kleur: 'bg-gray-100 text-gray-500' };
            if (!w.aftrapUtc) return null;
            const vandaag = new Date().toLocaleDateString('en-CA', { timeZone: WK_TZ });
            if (wkDagSleutel(w.aftrapUtc) === vandaag) return { label: 'Vandaag', kleur: 'bg-orange-100 text-orange-700' };
            return null; // komend: de tijd spreekt voor zich
        };

        const ORANJE = 'Nederland';
        const isOranje = (w) => w.team1 === ORANJE || w.team2 === ORANJE;

        // Eén wedstrijdregel: team1 — uitslag/tijd — team2, met optioneel doelpuntenmakers.
        const WedstrijdRij = ({ w, toonScorers }) => {
            const st = statusVan(w);
            const gespeeld = !!w.score;
            const scorers = (lst) => (lst || []).map(g =>
                `${g.naam}${g.minuut ? ` ${g.minuut}'` : ''}${g.strafschop ? ' (p)' : ''}${g.eigendoelpunt ? ' (e.d.)' : ''}`).join(', ');
            const s1 = gespeeld ? scorers(w.goals1) : '';
            const s2 = gespeeld ? scorers(w.goals2) : '';
            return (
                <div className={`px-2 py-1.5 rounded-lg ${isOranje(w) ? 'bg-orange-50 ring-1 ring-orange-200' : ''}`}>
                    <div className="flex items-center gap-2 text-sm">
                        <div className="flex-1 text-right truncate font-medium">{w.team1}</div>
                        <div className="shrink-0 text-center min-w-[3.25rem]">
                            {gespeeld
                                ? <span className="font-bold tabular-nums">{w.score.ft[0]} – {w.score.ft[1]}</span>
                                : <span className="text-gray-500 tabular-nums text-xs">{wkTijd(w.aftrapUtc) || 'n.t.b.'}</span>}
                        </div>
                        <div className="flex-1 truncate font-medium">{w.team2}</div>
                        {st && <span className={`shrink-0 text-[10px] px-1.5 py-0.5 rounded-full font-bold ${st.kleur}`}>{st.label}</span>}
                    </div>
                    {toonScorers && gespeeld && (s1 || s2) && (
                        <div className="flex gap-2 mt-0.5 text-[11px] text-gray-400">
                            <div className="flex-1 text-right truncate">{s1}</div>
                            <div className="shrink-0 w-[3.25rem]"></div>
                            <div className="flex-1 truncate">{s2}</div>
                        </div>
                    )}
                </div>
            );
        };

        // Standtabel van één groep.
        const StandTabel = ({ stand }) => (
            <table className="w-full text-xs">
                <thead>
                    <tr className="text-gray-400 border-b">
                        <th className="py-1 px-1 text-left font-semibold w-5">#</th>
                        <th className="py-1 px-1 text-left font-semibold">Team</th>
                        <th className="py-1 px-1 text-center font-semibold" title="Gespeeld">Gs</th>
                        <th className="py-1 px-1 text-center font-semibold hidden sm:table-cell" title="Gewonnen">W</th>
                        <th className="py-1 px-1 text-center font-semibold hidden sm:table-cell" title="Gelijk">G</th>
                        <th className="py-1 px-1 text-center font-semibold hidden sm:table-cell" title="Verloren">V</th>
                        <th className="py-1 px-1 text-center font-semibold" title="Doelsaldo">+/−</th>
                        <th className="py-1 px-1 text-center font-semibold" title="Punten">Ptn</th>
                    </tr>
                </thead>
                <tbody>
                    {stand.map(s => {
                        const rij = s.status === 'direct' ? 'bg-green-50' : s.status === 'derde' ? 'bg-amber-50' : '';
                        return (
                            <tr key={s.team} className={`border-b border-gray-100 ${rij} ${s.team === ORANJE ? 'font-bold text-orange-700' : ''}`}>
                                <td className="py-1.5 px-1 text-gray-400">{s.positie}</td>
                                <td className="py-1.5 px-1 truncate max-w-[8rem]">{s.team}</td>
                                <td className="py-1.5 px-1 text-center tabular-nums">{s.gespeeld}</td>
                                <td className="py-1.5 px-1 text-center tabular-nums hidden sm:table-cell">{s.w}</td>
                                <td className="py-1.5 px-1 text-center tabular-nums hidden sm:table-cell">{s.g}</td>
                                <td className="py-1.5 px-1 text-center tabular-nums hidden sm:table-cell">{s.v}</td>
                                <td className="py-1.5 px-1 text-center tabular-nums">{s.saldo > 0 ? '+' : ''}{s.saldo}</td>
                                <td className="py-1.5 px-1 text-center font-bold tabular-nums">{s.punten}</td>
                            </tr>
                        );
                    })}
                </tbody>
            </table>
        );

        // Eén groepskaart: stand + inklapbare wedstrijdenlijst.
        const GroepKaart = ({ groep, wedstrijden }) => {
            const eigen = wedstrijden.filter(w => w.groep === groep.id);
            return (
                <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div className="px-4 py-2.5 bg-gray-800 text-white">
                        <h3 className="font-bold flex items-center gap-2"><Trophy size={15} className="text-amber-400" /> Groep {groep.id}</h3>
                    </div>
                    <div className="p-3">
                        <StandTabel stand={groep.stand} />
                    </div>
                    <details className="group border-t border-gray-100">
                        <summary className="cursor-pointer select-none px-4 py-2 text-xs font-semibold text-gray-500 hover:bg-gray-50 flex items-center gap-1">
                            <ChevronDown size={14} className="group-open:rotate-180 transition-transform" /> Wedstrijden ({eigen.length})
                        </summary>
                        <div className="px-2 pb-3 space-y-0.5">
                            {eigen.map(w => <WedstrijdRij key={w.id} w={w} />)}
                        </div>
                    </details>
                </div>
            );
        };

        // Ranglijst van de groepsderden (8 beste plaatsen zich).
        const DerdenKaart = ({ derden }) => {
            if (!derden || derden.length === 0) return null;
            return (
                <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                    <div className="px-4 py-2.5 bg-amber-500 text-white">
                        <h3 className="font-bold flex items-center gap-2"><Star size={15} /> Beste nummers 3 — 8 plaatsen zich</h3>
                    </div>
                    <div className="p-3">
                        <p className="text-[11px] text-gray-400 mb-2">Voorlopige stand. De 8 beste groepsderden gaan door naar de ronde van 32.</p>
                        <table className="w-full text-xs">
                            <thead>
                                <tr className="text-gray-400 border-b">
                                    <th className="py-1 px-1 text-left font-semibold w-5">#</th>
                                    <th className="py-1 px-1 text-left font-semibold">Team</th>
                                    <th className="py-1 px-1 text-center font-semibold">Groep</th>
                                    <th className="py-1 px-1 text-center font-semibold" title="Gespeeld">Gs</th>
                                    <th className="py-1 px-1 text-center font-semibold" title="Doelsaldo">+/−</th>
                                    <th className="py-1 px-1 text-center font-semibold" title="Punten">Ptn</th>
                                </tr>
                            </thead>
                            <tbody>
                                {derden.map(d => (
                                    <tr key={d.groep} className={`border-b border-gray-100 ${d.geplaatst ? 'bg-green-50' : 'opacity-50'} ${d.team === ORANJE ? 'font-bold text-orange-700' : ''}`}>
                                        <td className="py-1.5 px-1 text-gray-400">{d.positie}</td>
                                        <td className="py-1.5 px-1 truncate max-w-[8rem]">{d.team}</td>
                                        <td className="py-1.5 px-1 text-center">{d.groep}</td>
                                        <td className="py-1.5 px-1 text-center tabular-nums">{d.gespeeld}</td>
                                        <td className="py-1.5 px-1 text-center tabular-nums">{d.saldo > 0 ? '+' : ''}{d.saldo}</td>
                                        <td className="py-1.5 px-1 text-center font-bold tabular-nums">{d.punten}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // Groepen-weergave: 12 kaarten + beste-nummers-3-tabel.
        const GroepenWeergave = ({ data }) => (
            <div className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {data.groepen.map(g => <GroepKaart key={g.id} groep={g} wedstrijden={data.wedstrijden} />)}
                </div>
                <DerdenKaart derden={data.derden} />
            </div>
        );

        // Speelschema: alle wedstrijden per dag, met filter op Oranje.
        const SpeelschemaWeergave = ({ data }) => {
            const [alleenOranje, setAlleenOranje] = useState(false);
            const lijst = alleenOranje ? data.wedstrijden.filter(isOranje) : data.wedstrijden;
            const perDag = [];
            let huidig = null;
            for (const w of lijst) {
                const sleutel = wkDagSleutel(w.aftrapUtc);
                if (!huidig || huidig.sleutel !== sleutel) { huidig = { sleutel, utc: w.aftrapUtc, items: [] }; perDag.push(huidig); }
                huidig.items.push(w);
            }
            return (
                <div className="space-y-4">
                    <div className="flex justify-end">
                        <button onClick={() => setAlleenOranje(v => !v)} className={`text-xs px-3 py-1.5 rounded-lg font-bold flex items-center gap-1.5 transition-colors ${alleenOranje ? 'bg-orange-500 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100'}`}>
                            <Star size={13} /> Alleen Oranje
                        </button>
                    </div>

                    const endTime = period.end ? period.end.getTime() : Infinity;
                    if (checkTime >= startTime && checkTime <= endTime) {

                        const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                    const startTime = period.start.getTime();
                    const endTime = period.end ? period.end.getTime() : Infinity;
                    const cycleLen = period.cycle || 3; 
                    
                    if (checkTime >= startTime && checkTime <= endTime) {
                        const diffTime = Math.floor((checkTime - startTime) / (1000 * 60 * 60 * 24));
                        if (diffTime >= 0 && diffTime % cycleLen === 0) {

                const cycleLen = currentPeriod.cycle || 3;
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                const diffTime = startOfToday.getTime() - startDate.getTime();
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays < 0) return startDate; 
                
                const daysSinceTraining = diffDays % cycleLen;

                updatedHistory[lastIdx].end = prevEndDate;
                updatedHistory.push({ start: newDate, end: null });
                setSobrietyHistory(updatedHistory);
                setShowSoberSettingsModal(false);
            };

            const handleCorrectArmDate = () => {
                const newDate = new Date(newArmStartDate + "T00:00:00");
                if (isNaN(newDate)) return;
                const updatedHistory = [...armHistory];
                const lastIdx = updatedHistory.length - 1;
                
                updatedHistory[lastIdx].start = newDate;
                updatedHistory[lastIdx].cycle = parseInt(newArmCycle);
                
                setArmHistory(updatedHistory);
                setShowArmSettingsModal(false);
            };

            const handleNewArmCycle = () => {
                const newDate = new Date(newArmStartDate + "T00:00:00");
                if (isNaN(newDate)) return;
                
                const updatedHistory = [...armHistory];
                const lastIdx = updatedHistory.length - 1;
                const lastScheduled = getLastScheduledArmDate();
                
                let prevEndDate;

                if (newDate > lastScheduled) {
                    prevEndDate = new Date(lastScheduled);
                    prevEndDate.setDate(prevEndDate.getDate() - 1);
                } else {
                    prevEndDate = new Date(newDate);
                    prevEndDate.setDate(prevEndDate.getDate() - 1);
                }

                if (prevEndDate < updatedHistory[lastIdx].start) {
                    updatedHistory[lastIdx].start = newDate;
                    updatedHistory[lastIdx].cycle = parseInt(newArmCycle);
                } else {
                    updatedHistory[lastIdx].end = prevEndDate;
                    updatedHistory.push({ start: newDate, end: null, cycle: parseInt(newArmCycle) });
                }

                setArmHistory(updatedHistory);
                setShowArmSettingsModal(false);
            };

            const handleMinoxDateChange = () => {
                const newDate = new Date(newMinoxStartDateInput + "T00:00:00");
                if (isNaN(newDate)) return;
                setMinoxStartDate(newDate);
                setShowMinoxSettingsModal(false);

            // --- FILE SYSTEM ACCESS API LOGICA ---
            // Eén bron voor wat er naar het JSON-bestand wordt geschreven. Voorkomt dat de
            // verschillende opslag-plekken uit sync raken als er een veld bijkomt.
            const buildExportData = (over = {}) => ({
                shifts: over.shifts !== undefined ? over.shifts : manualShifts,
                sobriety: sobrietyHistory,
                armHistory: armHistory,
                minoxStart: minoxStartDate,
                amberShifts: amberShifts,
                tijdvakShifts: tijdvakShifts,

            const handleSaveAs = async () => {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'mijn_herstel_dashboard.json',

                            description: 'JSON Data Bestand',

                    });
                    setFileHandle(handle);
                    await writeToFile(handle, buildExportData());
                } catch (err) {
                    console.error("Opslaan geannuleerd:", err);

            };

            const handleOpenFile = async () => {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'JSON Data Bestand',
                            accept: {'application/json': ['.json']},
                        }],
                        multiple: false
                    });
                    
                    const file = await handle.getFile();
                    const contents = await file.text();
                    const data = JSON.parse(contents);
                    
                    if (data.shifts) {
                        setManualShifts(data.shifts);
                        if(data.sobriety) setSobrietyHistory(data.sobriety.map(p => ({ start: new Date(p.start), end: p.end ? new Date(p.end) : null })));
                        if(data.armHistory) {
                            setArmHistory(data.armHistory.map(p => ({ start: new Date(p.start), end: p.end ? new Date(p.end) : null, cycle: p.cycle || 3 })));
                        } else if(data.armStart) {
                            setArmHistory([{ start: new Date(data.armStart), end: null, cycle: 3 }]);
                        }
                        if(data.minoxStart) setMinoxStartDate(new Date(data.minoxStart));
                        if(data.amberShifts) setAmberShifts(data.amberShifts);
                        if(data.tijdvakShifts) setTijdvakShifts(data.tijdvakShifts);
                        if(data.rosterOverrides) setRosterOverrides(data.rosterOverrides);
                    } else {
                        setManualShifts(data);
                    }

                    setFileHandle(handle);
                    setSaveStatus("Gekoppeld & Ingeladen");
                    localStorage.setItem('dashboard_manual_shifts', JSON.stringify(data.shifts || data));
                    if(data.amberShifts) localStorage.setItem('amber_shifts', JSON.stringify(data.amberShifts));
                    if(data.tijdvakShifts) localStorage.setItem('tijdvak_shifts', JSON.stringify(data.tijdvakShifts));
                    if(data.rosterOverrides) localStorage.setItem('dashboard_roster_overrides', JSON.stringify(data.rosterOverrides));
                    
                } catch (err) {
                    console.error("Openen geannuleerd of mislukt:", err);
                }
            };

            const writeToFile = async (handle, data) => {
                if (!handle) return;
                try {
                    setSaveStatus("Aan het opslaan...");
                    const writable = await handle.createWritable();
                    await writable.write(JSON.stringify(data, null, 2));
                    await writable.close();
                    setSaveStatus("Bestand bijgewerkt");
                } catch (err) {
                    console.error("Fout bij wegschrijven:", err);
                    setSaveStatus("Fout bij opslaan bestand!");
                }
            };

            const saveData = (newShifts) => {
                setManualShifts(newShifts);
                localStorage.setItem('dashboard_manual_shifts', JSON.stringify(newShifts));
                if (fileHandle) {
                    writeToFile(fileHandle, buildExportData({ shifts: newShifts }));

                    setSaveStatus("Alleen lokaal (browser)");

            };

            // --- ROOSTER-CORRECTIES: automatische diensten verbergen of aanpassen ---
            // De correcties liggen als override-laag (per UID) bovenop het gesynchroniseerde
            // rooster, zodat een volgende sync ze niet overschrijft.
            const persistRosterOverrides = (next) => {
                setRosterOverrides(next);
                localStorage.setItem('dashboard_roster_overrides', JSON.stringify(next));
                if (fileHandle) writeToFile(fileHandle, buildExportData({ rosterOverrides: next }));

            };
            const handleHideRosterShift = (uid) => {
                if (!uid) return;
                if (!window.confirm("Deze dienst van je rooster verwijderen?\n\nHij verdwijnt van je kalender en telt niet mee in je urenoverzicht. Je kunt dit terugdraaien via het Administratie-overzicht.")) return;
                persistRosterOverrides({ ...rosterOverrides, [uid]: { ...(rosterOverrides[uid] || {}), hidden: true } });
            };
            const restoreRosterShift = (uid) => {
                if (!uid) return;
                const next = { ...rosterOverrides };
                delete next[uid];
                persistRosterOverrides(next);
            };
            const openEditShift = (dateKey, e) => {
                const hhmm = (d) => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                setEditShift({ uid: e.uid, dateKey, summary: cleanSummary(e.summary) || "", startTime: hhmm(e.sortStart), endTime: hhmm(e.sortEnd) });
            };
            const saveEditShift = () => {
                if (!editShift || !editShift.uid) { setEditShift(null); return; }
                const { uid, dateKey, startTime, endTime, summary } = editShift;
                const start = new Date(`${dateKey}T${startTime}:00`);
                let end = new Date(`${dateKey}T${endTime}:00`);
                if (end <= start) end = new Date(end.getTime() + 24 * 3600 * 1000); // nachtdienst: eind volgende dag
                persistRosterOverrides({ ...rosterOverrides, [uid]: { ...(rosterOverrides[uid] || {}), hidden: false, summary, startISO: start.toISOString(), endISO: end.toISOString() } });
                setEditShift(null);
            };

            // --- KALENDER LOGICA ---
            const handleDeleteShift = (dateKey, id) => {
                const updatedShifts = { ...manualShifts };
                if (updatedShifts[dateKey]) {
                    updatedShifts[dateKey] = updatedShifts[dateKey].filter(s => s.id !== id);
                    if (updatedShifts[dateKey].length === 0) delete updatedShifts[dateKey];
                    saveData(updatedShifts);
                }
            };

            const cleanSummary = (summary) => {
                if (!summary) return "";
                const cleaned = summary.replace(/^\d{1,2}:\d{2}\s*[-–]\s*\d{1,2}:\d{2}\s*/, '').trim();
                if (cleaned.toLowerCase().includes('verlof naar rato')) return 'Verlof';
                return cleaned;
            };

            const parseICS = (icsData) => {
                const events = {};
                const lines = icsData.split(/\r\n|\n|\r/);
                let currentEvent = null;

                const parseDate = (dateStr) => {
                    if (!dateStr) return null;
                    const clean = dateStr.trim();
                    const y = parseInt(clean.substring(0, 4)), m = parseInt(clean.substring(4, 6)) - 1, d = parseInt(clean.substring(6, 8));
                    
                    if (clean.includes('T')) {
                        const h = parseInt(clean.substring(9, 11));
                        const min = parseInt(clean.substring(11, 13));
                        const date = new Date(Date.UTC(y, m, d, h, min));
                        return date;
                    }
                    return new Date(y, m, d);
                };

                lines.forEach(line => {
                    if (line.startsWith('BEGIN:VEVENT')) currentEvent = { status: 'CONFIRMED' };
                    else if (line.startsWith('END:VEVENT')) {
                        if (currentEvent?.start) {
                            const key = currentEvent.start.toLocaleDateString('en-CA');
                            if (!events[key]) events[key] = [];
                            events[key].push(currentEvent);
                        }
                        currentEvent = null;
                    } else if (currentEvent) {
                        if (line.startsWith('DTSTART')) currentEvent.start = parseDate(line.split(':')[1]);
                        else if (line.startsWith('DTEND')) currentEvent.end = parseDate(line.split(':')[1]);
                        else if (line.startsWith('SUMMARY')) currentEvent.summary = line.substring(8);
                        else if (line.startsWith('UID')) currentEvent.uid = line.slice(line.indexOf(':') + 1).trim();
                    }
                });
                return events;
            };

            // Op file:// is fetch() geblokkeerd; herlaad schedule-data.js daarom als verse
            // <script>-tag (met cache-bust) zodat window.SCHEDULE_ICS de laatste sync van
            // rooster-sync.js bevat — ook als het dashboard al open staat.
            const herlaadScheduleData = () => new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = `schedule-data.js?t=${Date.now()}`;
                s.onload = () => { s.remove(); resolve(true); };
                s.onerror = () => { s.remove(); resolve(false); };
                document.head.appendChild(s);
            });

            const fetchAndParseICS = async () => {
                setLoadingShifts(true);
                try {
                    // Rooster laden. Lokaal (file://): uit window.SCHEDULE_ICS (schedule-data.js,
                    // gegenereerd door rooster-sync.js), eerst vers herladen van schijf. Anders
                    // (GitHub Pages): fetch ./schedule.ics, server-side ververst door de GitHub Action.
                    if (typeof window !== 'undefined' && window.SCHEDULE_ICS) await herlaadScheduleData();
                    let txt = (typeof window !== 'undefined' && window.SCHEDULE_ICS) ? window.SCHEDULE_ICS : "";
                    if (!txt.includes("BEGIN:VCALENDAR")) {
                        const res = await fetch(`./schedule.ics?t=${Date.now()}`, { cache: "no-store" });
                        if (res.ok) txt = await res.text();
                    }
                    if (!txt.includes("BEGIN:VCALENDAR")) throw new Error("Geen rooster gevonden (draai rooster-sync.js)");
                    const parsedShifts = parseICS(txt);
                    setRosterShifts(parsedShifts);

                    // Verwijder tijdvakken tot de laatste ROSTER datum
                    const rosterDates = Object.keys(parsedShifts);
                    if (rosterDates.length > 0) {
                        // Vind de laatste datum in ROSTER data
                        const latestRosterDate = rosterDates.reduce((latest, current) => {
                            return current > latest ? current : latest;
                        });

                        // Verwijder alle tijdvakken tot en met deze datum
                        setTijdvakShifts(prev => {
                            const updated = { ...prev };
                            let removed = 0;
                            Object.keys(updated).forEach(dateKey => {
                                if (dateKey <= latestRosterDate) {
                                    delete updated[dateKey];
                                    removed++;
                                }
                            });
                            if (removed > 0) {
                                console.log(`${removed} tijdvak(ken) verwijderd tot ${latestRosterDate}`);
                            }
                            return updated;
                        });
                    }
                } catch (e) {
                    console.log("Auto-rooster laadt niet.");
                } finally {
                    setLoadingShifts(false);
                }
            };

            // Live verversen: haal het rooster opnieuw op zodra het dashboard weer op de
            // voorgrond komt (tab/app openen of terugkeren) en periodiek terwijl het open
            // staat. Zo is het rooster bij openen altijd actueel zonder handmatig verversen.
            useEffect(() => {
                const ververs = () => { if (document.visibilityState === 'visible') fetchAndParseICS(); };
                document.addEventListener('visibilitychange', ververs);
                window.addEventListener('focus', ververs);
                const id = setInterval(ververs, 5 * 60 * 1000);
                return () => {
                    document.removeEventListener('visibilitychange', ververs);
                    window.removeEventListener('focus', ververs);
                    clearInterval(id);
                };
            }, []);

            const formatTime = (d) => d ? d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' }) : "";

            // --- WEER (Open-Meteo, Weesp) — icoon + min/max temp per dag, ~16 dagen vooruit ---
            const weatherIcon = (code) => {
                if (code === 0) return '☀️';
                if (code === 1 || code === 2) return '🌤️';
                if (code === 3) return '☁️';
                if (code === 45 || code === 48) return '🌫️';
                if (code >= 51 && code <= 57) return '🌦️';
                if (code >= 61 && code <= 67) return '🌧️';
                if (code >= 71 && code <= 77) return '❄️';
                if (code >= 80 && code <= 82) return '🌦️';
                if (code >= 85 && code <= 86) return '🌨️';
                if (code >= 95) return '⛈️';
                return '🌡️';
            };
            const [weather, setWeather] = useState(() => {
                try {
                    const c = JSON.parse(localStorage.getItem('weather_cache') || 'null');
                    if (c && (Date.now() - c.ts) < 3 * 60 * 60 * 1000) return c.data;
                } catch (e) {}
                return {};
            });
            useEffect(() => {
                try {
                    const c = JSON.parse(localStorage.getItem('weather_cache') || 'null');
                    if (c && (Date.now() - c.ts) < 3 * 60 * 60 * 1000) return;
                } catch (e) {}
                const url = "https://api.open-meteo.com/v1/forecast?latitude=52.31&longitude=5.04&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Europe/Amsterdam&forecast_days=16";
                fetch(url).then(r => r.json()).then(d => {
                    if (!d || !d.daily) return;
                    const map = {};
                    d.daily.time.forEach((date, i) => {
                        map[date] = { code: d.daily.weather_code[i], max: Math.round(d.daily.temperature_2m_max[i]), min: Math.round(d.daily.temperature_2m_min[i]) };
                    });
                    setWeather(map);
                    try { localStorage.setItem('weather_cache', JSON.stringify({ ts: Date.now(), data: map })); } catch (e) {}
                }).catch(e => console.log('Weer laadt niet:', e.message));
            }, []);

            // Maanfase berekening - retourneert 🌑 (nieuwe maan) of 🌕 (volle maan) of null
            // Genereer alle maan datums van 2025-2050 bij eerste aanroep
            const moonDatesCache = (() => {
                const cache = {};
                // Bekende nieuwe maan: 29 januari 2025 12:36 UTC
                const knownNewMoon = Date.UTC(2025, 0, 29, 12, 36);
                const synodicMonth = 29.53058867 * 24 * 60 * 60 * 1000; // in milliseconden

                // Bereken alle nieuwe en volle manen van 2025-2050
                const startDate = new Date(2025, 0, 1).getTime();
                const endDate = new Date(2050, 11, 31).getTime();

                // Vind eerste nieuwe maan voor 2025
                let newMoonTime = knownNewMoon;
                while (newMoonTime > startDate) newMoonTime -= synodicMonth;
                while (newMoonTime < startDate) newMoonTime += synodicMonth;

                // Genereer alle nieuwe manen
                while (newMoonTime <= endDate) {
                    const d = new Date(newMoonTime);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    cache[key] = '🌑';
                    newMoonTime += synodicMonth;
                }

                // Genereer alle volle manen (halverwege tussen nieuwe manen)
                let fullMoonTime = knownNewMoon + (synodicMonth / 2);
                while (fullMoonTime > startDate) fullMoonTime -= synodicMonth;
                while (fullMoonTime < startDate) fullMoonTime += synodicMonth;

                while (fullMoonTime <= endDate) {
                    const d = new Date(fullMoonTime);
                    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    cache[key] = '🌕';
                    fullMoonTime += synodicMonth;
                }

                return cache;
            })();

            const getMoonPhase = (date) => {
                const dateKey = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                return moonDatesCache[dateKey] || null;
            };

            const handleAddNote = () => {
                if (!selectedDate || !newNote.trim()) return;
                const updated = { ...manualShifts };
                if (!updated[selectedDate]) updated[selectedDate] = [];
                updated[selectedDate].push({
                    id: Date.now(), 
                    summary: newNote, 
                    isManual: true, 
                    isNote: true 
                });
                saveData(updated);
                setShowAddModal(false);
                setSelectedDate(null);
                setNewNote("");
            };

            // --- PDF ROOSTER UPLOAD FUNCTIES ---
            const handlePdfUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                setPdfParsing(true);
                setPdfError(null);
                setParsedShifts([]);

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    
                    let fullText = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n';
                    }
                    
                    const shifts = parseG4SRooster(fullText);
                    
                    if (shifts.length === 0) {
                        setPdfError("Geen diensten gevonden in dit PDF bestand. Zorg dat het een G4S tijdvakrooster is.");
                    } else {
                        setParsedShifts(shifts);
                    }
                } catch (err) {
                    console.error("PDF parsing error:", err);
                    setPdfError("Kon PDF niet lezen: " + err.message);
                } finally {
                    setPdfParsing(false);
                }
            };

            const parseG4SRooster = (text) => {
                const shifts = [];
                
                // Normaliseer de tekst
                const normalized = text.replace(/\s+/g, ' ');
                
                // Regex patronen voor G4S rooster
                // Format: datum (d-m-yyyy of dd-mm-yyyy) gevolgd door "Tijdvak" en dan tijden (hh:mm-hh:mm)
                const dateTimePattern = /(\d{1,2}-\d{1,2}-\d{4})\s*Tijdvak\s*(\d{2}[:.]\d{2}[-–]\d{2}[:.]\d{2})/gi;
                
                let match;
                while ((match = dateTimePattern.exec(normalized)) !== null) {
                    const dateParts = match[1].split('-');
                    const day = parseInt(dateParts[0]);
                    const month = parseInt(dateParts[1]) - 1; // JS months are 0-indexed
                    const year = parseInt(dateParts[2]);
                    
                    const timeStr = match[2].replace(/\./g, ':').replace('–', '-');
                    
                    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dateObj = new Date(year, month, day);
                    
                    // Skip invalid dates
                    if (isNaN(dateObj.getTime())) continue;
                    
                    shifts.push({
                        dateKey,
                        dateDisplay: dateObj.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }),
                        time: timeStr,
                        summary: `Dienst ${timeStr}`,
                        selected: true
                    });
                }
                
                // Sorteer op datum
                shifts.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
                
                return shifts;
            };

            const toggleShiftSelection = (index) => {
                setParsedShifts(prev => prev.map((shift, i) => 
                    i === index ? { ...shift, selected: !shift.selected } : shift
                ));
            };

            const selectAllShifts = (selected) => {
                setParsedShifts(prev => prev.map(shift => ({ ...shift, selected })));
            };

            const importSelectedShifts = () => {
                const selectedShifts = parsedShifts.filter(s => s.selected);
                if (selectedShifts.length === 0) return;

                const updated = { ...manualShifts };
                
                selectedShifts.forEach(shift => {
                    if (!updated[shift.dateKey]) updated[shift.dateKey] = [];
                    
                    // Check of deze shift al bestaat (voorkom duplicaten)
                    const exists = updated[shift.dateKey].some(
                        s => s.summary === shift.summary || s.summary.includes(shift.time)
                    );
                    
                    if (!exists) {
                        updated[shift.dateKey].push({
                            id: Date.now() + Math.random(),
                            summary: shift.summary,
                            isManual: true,
                            isNote: false,
                            isG4SShift: true
                        });
                    }
                });

                saveData(updated);
                setShowPdfModal(false);
                setParsedShifts([]);
                setPdfError(null);
            };

            // --- AMBER ROOSTER FUNCTIES ---
            const amberMNames = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];

            const decodeAmberShift = (code) => {
                if (!code || code.length < 4) return null;
                const cleanCode = code.toUpperCase().trim();
                
                const shiftMap = {
                    'A080': { startTime: '07:00', endTime: '15:30', duration: 8.5 },
                    'A070': { startTime: '07:00', endTime: '14:30', duration: 7.5 },
                    'A040': { startTime: '07:00', endTime: '11:00', duration: 4 },
                    'B080': { startTime: '08:00', endTime: '16:30', duration: 8.5 },
                    'B070': { startTime: '08:00', endTime: '15:30', duration: 7.5 },
                    'B040': { startTime: '08:00', endTime: '12:00', duration: 4 },
                    'C080': { startTime: '09:00', endTime: '17:30', duration: 8.5 },
                    'C070': { startTime: '09:00', endTime: '16:30', duration: 7.5 },
                    'C040': { startTime: '09:00', endTime: '13:00', duration: 4 },
                    'H280': { startTime: '14:30', endTime: '23:00', duration: 8.5 },
                };
                
                return shiftMap[cleanCode] || null;
            };

            const parseAmberBulkInput = (input, month, year) => {
                const results = [];
                const pattern = /(\d{1,2})\s*[:\-\s]\s*([ABCH]\d{3})/gi;
                let match;
                
                while ((match = pattern.exec(input)) !== null) {
                    const day = parseInt(match[1]);
                    const code = match[2].toUpperCase();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    
                    if (day < 1 || day > daysInMonth) continue;
                    
                    const decoded = decodeAmberShift(code);
                    if (decoded) {
                        const dateObj = new Date(year, month, day);
                        const dateKey = toLocalISOString(dateObj);
                        results.push({
                            day,
                            dateKey,
                            code,
                            decoded,
                            dateDisplay: dateObj.toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short' }),
                            selected: true
                        });
                    }
                }
                
                results.sort((a, b) => a.day - b.day);
                return results;
            };

            const handleAmberBulkParse = () => {
                const parsed = parseAmberBulkInput(amberBulkInput, amberMonth, amberYear);
                setAmberBulkParsed(parsed);
            };

            const toggleAmberBulkSelection = (index) => {
                setAmberBulkParsed(prev => prev.map((item, i) => 
                    i === index ? { ...item, selected: !item.selected } : item
                ));
            };

            const importAmberBulkShifts = () => {
                const selected = amberBulkParsed.filter(s => s.selected);
                if (selected.length === 0) return;

                const updated = { ...amberShifts };

                // Verwijder eerst alle bestaande shifts voor de geselecteerde maand
                const month = amberMonth;
                const year = amberYear;
                Object.keys(updated).forEach(dateKey => {
                    const d = new Date(dateKey);
                    if (d.getMonth() === month && d.getFullYear() === year) {
                        delete updated[dateKey];
                    }
                });

                // Voeg nieuwe shifts toe
                selected.forEach(entry => {
                    updated[entry.dateKey] = [{
                        id: Date.now() + Math.random(),
                        code: entry.code,
                        startTime: entry.decoded.startTime,
                        endTime: entry.decoded.endTime
                    }];
                });

                setAmberShifts(updated);
                closeAmberModal();
            };

            const analyzeAmberScreenshot = async (file) => {
                setAmberAnalyzing(true);
                setAmberAnalyzeError(null);
                
                try {
                    const base64Data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => {
                            const base64 = reader.result.split(",")[1];
                            resolve(base64);
                        };
                        reader.onerror = () => reject(new Error("Kon bestand niet lezen"));
                        reader.readAsDataURL(file);
                    });
                    
                    const mediaType = file.type || 'image/png';
                    
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 1000,
                            messages: [
                                {
                                    role: "user",
                                    content: [
                                        {
                                            type: "image",
                                            source: {
                                                type: "base64",
                                                media_type: mediaType,
                                                data: base64Data,
                                            }
                                        },
                                        {
                                            type: "text",
                                            text: `Dit is een screenshot van een werkrooster. Analyseer de afbeelding en extract alle werkdagen met hun codes.

De codes bestaan uit:
- Een letter (A, B of C) voor de starttijd
- Een getal (040, 070 of 080) voor de duur

Voorbeelden: A080, B070, C040

Geef ALLEEN de data terug in dit exacte formaat, niets anders:
dag:code, dag:code, dag:code

Bijvoorbeeld: 2:C040, 3:B070, 5:B070, 6:A080

Als je geen rooster of codes kunt vinden, antwoord dan alleen: GEEN_DATA`
                                        }
                                    ]
                                }
                            ]
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API fout: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    const result = data.content[0].text.trim();
                    
                    if (result === "GEEN_DATA" || result.length < 3) {
                        setAmberAnalyzeError("Geen rooster gevonden in de afbeelding.");
                        return;
                    }
                    
                    setAmberBulkInput(result);
                    const parsed = parseAmberBulkInput(result, amberMonth, amberYear);
                    if (parsed.length > 0) {
                        setAmberBulkParsed(parsed);
                    } else {
                        setAmberAnalyzeError("Kon de gevonden data niet verwerken.");
                    }
                    
                } catch (err) {
                    // Geef duidelijkere foutmelding
                    if (err.message.includes("fetch") || err.message.includes("network")) {
                        setAmberAnalyzeError("AI analyse werkt alleen binnen Claude. Stuur de screenshot naar Claude in de chat en plak de code hieronder.");
                    } else {
                        setAmberAnalyzeError("Fout: " + err.message);
                    }
                } finally {
                    setAmberAnalyzing(false);
                }
            };

            const handleAmberScreenshotUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                analyzeAmberScreenshot(file);
            };

            const openAmberModal = () => {
                setAmberMonth(viewDate.getMonth());
                setAmberYear(viewDate.getFullYear());
                setAmberBulkInput("");
                setAmberBulkParsed([]);
                setAmberAnalyzeError(null);
                setShowAmberModal(true);
            };

            const closeAmberModal = () => {
                setShowAmberModal(false);
                setAmberBulkInput("");
                setAmberBulkParsed([]);
                setAmberAnalyzeError(null);
            };

            const deleteAmberShift = (dateKey) => {
                const updated = { ...amberShifts };
                delete updated[dateKey];
                setAmberShifts(updated);
            };

            // --- TIJDVAK ROOSTER FUNCTIES ---
            const parseTijdvakBulkInput = (input, month, year) => {
                const results = [];
                const seenDates = new Set();

                // Split input per regel of komma voor betere parsing
                const lines = input.split(/[\n,]+/).map(l => l.trim()).filter(l => l.length > 0);

                for (const line of lines) {
                    let match;

                    // Pattern 1: dd-mm-yyyy: hh:mm-hh:mm (volledige datum)
                    match = line.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})\s*[:\s]\s*(\d{1,2}[:.]\d{2})\s*[-–]\s*(\d{1,2}[:.]\d{2})/i);
                    if (match) {
                        const day = parseInt(match[1]);
                        const monthParsed = parseInt(match[2]) - 1;
                        const yearParsed = parseInt(match[3]);
                        const startTime = match[4].replace('.', ':');
                        const endTime = match[5].replace('.', ':');

                        const dateObj = new Date(yearParsed, monthParsed, day);
                        if (!isNaN(dateObj.getTime())) {
                            const dateKey = toLocalISOString(dateObj);
                            if (!seenDates.has(dateKey)) {
                                seenDates.add(dateKey);
                                results.push({
                                    day,
                                    dateKey,
                                    startTime,
                                    endTime,
                                    dateDisplay: dateObj.toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }),
                                    selected: true
                                });
                            }
                        }
                        continue;
                    }

                    // Pattern 2: dd-mm: hh:mm-hh:mm (dag en maand)
                    match = line.match(/^(\d{1,2})[-\/](\d{1,2})\s*[:\s]\s*(\d{1,2}[:.]\d{2})\s*[-–]\s*(\d{1,2}[:.]\d{2})/i);
                    if (match) {
                        const day = parseInt(match[1]);
                        const monthParsed = parseInt(match[2]) - 1;
                        const startTime = match[3].replace('.', ':');
                        const endTime = match[4].replace('.', ':');

                        // Gebruik geselecteerd jaar
                        const dateObj = new Date(year, monthParsed, day);
                        if (!isNaN(dateObj.getTime())) {
                            const dateKey = toLocalISOString(dateObj);
                            if (!seenDates.has(dateKey)) {
                                seenDates.add(dateKey);
                                results.push({
                                    day,
                                    dateKey,
                                    startTime,
                                    endTime,
                                    dateDisplay: dateObj.toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }),
                                    selected: true
                                });
                            }
                        }
                        continue;
                    }

                    // Pattern 3: dd: hh:mm-hh:mm (alleen dag, gebruikt geselecteerde maand/jaar)
                    match = line.match(/^(\d{1,2})\s*[:\s]\s*(\d{1,2}[:.]\d{2})\s*[-–]\s*(\d{1,2}[:.]\d{2})/i);
                    if (match) {
                        const day = parseInt(match[1]);
                        const startTime = match[2].replace('.', ':');
                        const endTime = match[3].replace('.', ':');

                        const daysInMonth = new Date(year, month + 1, 0).getDate();
                        if (day >= 1 && day <= daysInMonth) {
                            const dateObj = new Date(year, month, day);
                            const dateKey = toLocalISOString(dateObj);
                            if (!seenDates.has(dateKey)) {
                                seenDates.add(dateKey);
                                results.push({
                                    day,
                                    dateKey,
                                    startTime,
                                    endTime,
                                    dateDisplay: dateObj.toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short' }),
                                    selected: true
                                });
                            }
                        }
                    }
                }

                results.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
                return results;
            };

            const handleTijdvakBulkParse = () => {
                const parsed = parseTijdvakBulkInput(tijdvakBulkInput, tijdvakMonth, tijdvakYear);
                setTijdvakBulkParsed(parsed);
            };

            const toggleTijdvakBulkSelection = (index) => {
                setTijdvakBulkParsed(prev => prev.map((item, i) =>
                    i === index ? { ...item, selected: !item.selected } : item
                ));
            };

            const importTijdvakBulkShifts = () => {
                const selected = tijdvakBulkParsed.filter(s => s.selected);
                if (selected.length === 0) return;

                const updated = { ...tijdvakShifts };

                selected.forEach(entry => {
                    updated[entry.dateKey] = {
                        id: Date.now() + Math.random(),
                        startTime: entry.startTime,
                        endTime: entry.endTime
                    };
                });

                setTijdvakShifts(updated);
                closeTijdvakModal();
            };

            const openTijdvakModal = () => {
                setTijdvakMonth(viewDate.getMonth());
                setTijdvakYear(viewDate.getFullYear());
                setTijdvakBulkInput("");
                setTijdvakBulkParsed([]);
                setShowTijdvakModal(true);
            };

            const closeTijdvakModal = () => {
                setShowTijdvakModal(false);
                setTijdvakBulkInput("");
                setTijdvakBulkParsed([]);
            };

            const deleteTijdvakShift = (dateKey) => {
                const updated = { ...tijdvakShifts };
                delete updated[dateKey];
                setTijdvakShifts(updated);
            };

            const toggleFilter = (filterName) => {
                setCalendarFilters(prev => ({
                    ...prev,
                    [filterName]: !prev[filterName]
                }));
            };
            
            const filterRosterShifts = (shifts) => {
                if (!shifts || shifts.length === 0) return [];
                const sorted = [...shifts].sort((a, b) => a.start - b.start);
                
                return sorted.reduce((acc, cur) => {
                    const s = cur.summary?.toLowerCase() || "";
                    if (s.includes("roostervrij")) return acc; 
                    
                    if (acc.length > 0) {
                        const last = acc[acc.length - 1];
                        if (cur.start < new Date(last.end.getTime() - 60000)) {
                            acc[acc.length - 1] = cur;
                        } else {
                            acc.push(cur);
                        }
                    } else {
                        acc.push(cur);
                    }
                    return acc;
                }, []);
            };

            const isSwimTimeConflict = (swimTimeStr, shifts, currentDayDate) => {
                if (!shifts || shifts.length === 0) return false;
                
                const [startStr, endStr] = swimTimeStr.split(' - ').map(s => s.replace(' uur', '').trim());
                const [startH, startM] = startStr.split(/[:.]/).map(Number);
                const [endH, endM] = endStr.split(/[:.]/).map(Number);
                
                const swimStart = new Date(currentDayDate);
                swimStart.setHours(startH, startM, 0, 0);
                const swimEnd = new Date(currentDayDate);
                swimEnd.setHours(endH, endM, 0, 0);
                
                return shifts.some(shift => {
                    if (shift.isNote) return false; 
                    if (shift.summary?.toLowerCase().includes('verlof')) return false;
                    return (swimStart < shift.sortEnd && swimEnd > shift.sortStart);
                });
            };

            const nextM = () => { const n = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1); if(n.getFullYear()<=2027) setViewDate(n); };
            const prevM = () => { const p = new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1); if(p>=new Date('2025-10-01')) setViewDate(p); };
            const mNames = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];

            const renderCalendar = () => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay() === 0 ? 6 : new Date(year, month, 1).getDay() - 1;
                const days = [];
                
                for (let i = 0; i < firstDay; i++) days.push(<div key={`e-${i}`} className="h-36 bg-gray-50 border border-gray-100"></div>);

                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(year, month, day);
                    const dateKey = toLocalISOString(date);
                    const dayOfWeek = date.getDay();
                    
                    // SOBRIETY HISTORY CHECK (met filter)
                    const daySoberCount = calendarFilters.showSobriety ? getDaySoberCount(date) : 0;
                    
                    // ARM TRAINING HISTORY CHECK (met filter)
                    const isArmDay = calendarFilters.showTraining ? isArmTrainingDay(date) : false;

                    // AMBER SHIFT CHECK (met filter)
                    const amberShift = calendarFilters.showAmber ? amberShifts[dateKey]?.[0] : null;

                    // TIJDVAK CHECK (met filter) - voorlopig rooster uit G4S Connect
                    const tijdvakShift = calendarFilters.showTijdvak ? tijdvakShifts[dateKey] : null;

                    // SALARY DAY CHECK (met filter)
                    const salaryDay = calendarFilters.showSalary ? salaryDays[dateKey] : null;

                    // TRIGION DAY CHECK (met filter)
                    const trigionDay = calendarFilters.showTrigion ? trigionDays[dateKey] : null;

                    // Pas handmatige correcties toe: verborgen diensten eruit, aangepaste tijden/omschrijving erin.
                    const rosterRaw = (rosterShifts[dateKey] || [])
                        .map(s => {
                            const ov = s.uid ? rosterOverrides[s.uid] : null;
                            if (!ov) return s;
                            if (ov.hidden) return null;
                            const m = { ...s, edited: true };
                            if (ov.summary !== undefined) m.summary = ov.summary;
                            if (ov.startISO) m.start = new Date(ov.startISO);
                            if (ov.endISO) m.end = new Date(ov.endISO);
                            return m;
                        })
                        .filter(Boolean);
                    const finalRoster = calendarFilters.showWork ? filterRosterShifts(rosterRaw).map(s => ({
                        ...s, type: 'roster', sortStart: s.start, sortEnd: s.end
                    })) : [];

                    // Check of er een echte Roster dienst is (niet alleen verlof)
                    const hasRealRosterShift = finalRoster.length > 0;

                    const manualDay = calendarFilters.showWork ? (manualShifts[dateKey] || [])
                        // Filter G4S tijdvakken uit als er een echte Roster dienst is
                        .filter(s => {
                            if (s.isG4SShift && hasRealRosterShift) {
                                return false; // Verberg tijdvak als er een echte dienst is
                            }
                            if (s.isNote && !calendarFilters.showNotes) {
                                return false;
                            }
                            return true;
                        })
                        .map(s => {
                        let start = new Date(date);
                        let end = new Date(date);
                        if (s.isNote || s.isG4SShift) {
                            start.setHours(0, 0);
                            end.setHours(23, 59);
                        } else if (s.startTime) {
                            const [h1, m1] = s.startTime.split(':').map(Number);
                            const [h2, m2] = s.endTime.split(':').map(Number);
                            start.setHours(h1, m1);
                            end.setHours(h2, m2);
                        }
                        return { ...s, type: 'manual', sortStart: start, sortEnd: end };
                    }) : [];

                    const swimInfo = poolSchedule[dayOfWeek];
                    const swimEvents = [];
                    if (swimInfo.isOpen && calendarFilters.showSwimming) {
                        swimInfo.times.forEach(tStr => {
                            const allWorkShifts = [...finalRoster, ...manualDay];
                            if (!isSwimTimeConflict(tStr, allWorkShifts, date)) {
                                const [startStr, endStr] = tStr.split(' - ');
                                const [h1, m1] = startStr.split(/[:.]/).map(Number);
                                const [h2, m2] = endStr.split(/[:.]/).map(Number);
                                const start = new Date(date); start.setHours(h1, m1);
                                const end = new Date(date); end.setHours(h2, m2);
                                swimEvents.push({ type: 'swim', summary: tStr, sortStart: start, sortEnd: end });
                            }
                        });
                    }

                    const allEvents = [...finalRoster, ...manualDay, ...swimEvents].sort((a, b) => {
                        // Notities altijd bovenaan
                        if (a.isNote && !b.isNote) return -1;
                        if (!a.isNote && b.isNote) return 1;
                        // Daarna op tijd sorteren
                        return a.sortStart - b.sortStart;
                    });
                    const isToday = currentDate.toDateString() === date.toDateString();
                    
                    // Check voor werk: Roster diensten, handmatige shifts, OF G4S tijdvakken
                    const hasWork = allEvents.some(e => (e.type === 'roster' || (e.type === 'manual' && !e.isNote))) ||
                                   (manualShifts[dateKey] || []).some(s => s.isG4SShift); // Ook checken voor verborgen G4S tijdvakken
                    const isOnlyVerlof = hasWork && allEvents.every(e => e.type !== 'swim' && e.summary?.toLowerCase().includes('verlof'));

                    // Check of er een definitieve dienst is (Roster of PDF import)
                    const hasDefinitiveShift = finalRoster.length > 0 || (manualShifts[dateKey] || []).some(s => s.isG4SShift);

                    // Bepaal of tijdvak getoond moet worden (alleen als er GEEN definitieve dienst is)
                    const showTijdvak = tijdvakShift && !hasDefinitiveShift;

                    let bgClass = "bg-emerald-50 border-emerald-200";
                    if (hasWork && !isOnlyVerlof) bgClass = "bg-red-50 border-red-200";
                    // Tijdvak zonder definitieve dienst: amber gestippelde achtergrond
                    if (showTijdvak && !hasWork) bgClass = "bg-amber-50 border-amber-300 border-dashed";
                    if (isToday) bgClass = "bg-blue-50 ring-2 ring-blue-400"; 

                    days.push(
                        <div key={day} className={`h-36 border p-1 relative flex flex-col ${bgClass} group transition-colors`}>
                            <div className="flex justify-between items-start mb-1">
                                <span className={`text-sm font-bold ${isToday ? 'text-blue-600' : (hasWork && !isOnlyVerlof ? 'text-red-700' : 'text-emerald-700')}`}>{day}{getMoonPhase(date) && <span className="ml-1 text-xs" title={getMoonPhase(date) === '🌑' ? 'Nieuwe maan' : 'Volle maan'}>{getMoonPhase(date)}</span>}</span>
                                {isToday && <span className="text-[10px] bg-blue-600 text-white px-1 rounded">Vandaag</span>}
                                <button onClick={() => { setSelectedDate(dateKey); setNewNote(""); setShowAddModal(true); }} className="opacity-0 group-hover:opacity-100 text-blue-500 p-0.5 hover:bg-white/50 rounded"><Plus size={14}/></button>
                            </div>
                            
                            {weather[dateKey] && (
                                <div className="text-[9px] font-semibold text-sky-700 flex items-center gap-1 mb-0.5 px-0.5 whitespace-nowrap" title="Weersvoorspelling Weesp">
                                    <span className="text-[11px] leading-none">{weatherIcon(weather[dateKey].code)}</span>
                                    <span>{weather[dateKey].max}° / {weather[dateKey].min}°</span>
                                </div>
                            )}
                            <div className="flex-1 flex flex-col gap-1 overflow-y-auto custom-scrollbar">
                                {/* 1. NOTITIES EERST */}
                                {allEvents.filter(e => e.isNote).map((e) => (
                                    <div key={`m-${e.id}`} className="text-[10px] font-bold p-1 rounded border border-gray-200 mb-0.5 flex justify-between items-start group/item bg-white shadow-sm text-black w-full text-left">
                                        <span className="break-words w-full leading-tight">{e.summary}</span>
                                        <button onClick={(ev)=>{ev.stopPropagation(); handleDeleteShift(dateKey, e.id)}} className="opacity-0 group-hover/item:opacity-100 text-gray-400 hover:text-red-500 ml-1 shrink-0"><Trash2 size={10}/></button>
                                    </div>
                                ))}

                                {/* 2. AMBER'S SHIFT */}
                                {amberShift && (
                                    <div className="flex items-center justify-between text-[9px] text-pink-700 bg-pink-50 p-0.5 rounded border border-pink-200 w-full group/amber">
                                        <div className="flex items-center">
                                            <Heart size={10} className="mr-1 fill-pink-300"/>
                                            <span className="font-medium">Amber {amberShift.startTime}-{amberShift.endTime}</span>
                                        </div>
                                        <button onClick={(ev) => { ev.stopPropagation(); deleteAmberShift(dateKey); }} className="opacity-0 group-hover/amber:opacity-100 text-pink-500 hover:text-pink-700"><Trash2 size={10}/></button>
                                    </div>
                                )}

                                {/* 2.25 TIJDVAK (voorlopig rooster) - alleen tonen als geen definitieve dienst */}
                                {showTijdvak && (
                                    <div className="flex items-center justify-between text-[9px] text-amber-700 bg-amber-50 p-0.5 rounded border-2 border-dashed border-amber-400 w-full group/tijdvak">
                                        <div className="flex items-center">
                                            <Clock size={10} className="mr-1"/>
                                            <span className="font-medium">Tijdvak {tijdvakShift.startTime}-{tijdvakShift.endTime}</span>
                                        </div>
                                        <button onClick={(ev) => { ev.stopPropagation(); deleteTijdvakShift(dateKey); }} className="opacity-0 group-hover/tijdvak:opacity-100 text-amber-500 hover:text-amber-700"><Trash2 size={10}/></button>
                                    </div>
                                )}

                                {/* 2.5 SALARISDAG */}
                                {salaryDay && (
                                    <div className="flex items-center text-[9px] text-yellow-800 bg-yellow-100 p-0.5 rounded border border-yellow-300 w-full font-bold">
                                        <span className="mr-1">💰</span>
                                        <span>G4S P{salaryDay.periode}{salaryDay.note ? ` (${salaryDay.note})` : ''}</span>
                                    </div>
                                )}

                                {/* 2.6 TRIGION BETAALDAG */}
                                {trigionDay && (
                                    <div className="flex items-center text-[9px] text-yellow-800 bg-yellow-100 p-0.5 rounded border border-yellow-300 w-full font-bold">
                                        <span className="mr-1">💰</span>
                                        <span>Trigion P{trigionDay.periode}</span>
                                    </div>
                                )}

                                {/* 3. REST VAN DE EVENTS (geen notities) */}
                                {allEvents.filter(e => !e.isNote).map((e, idx) => {
                                    if (e.type === 'swim') {
                                        return (
                                            <div key={`s-${idx}`} className="flex flex-col items-start text-[9px] text-blue-700 bg-white/80 p-1 rounded border border-blue-100 mb-0.5 w-full text-left shadow-sm">
                                                <div className="flex items-center font-bold mb-0.5"><Droplets size={8} className="mr-1"/> <span>Zwemmen</span></div>
                                                <span className="font-medium block">{e.summary}</span>
                                            </div>
                                        );
                                    }
                                    if (e.type === 'roster') {
                                        const isVerlof = e.summary?.toLowerCase().includes('verlof');
                                        const txt = cleanSummary(e.summary);
                                        return (
                                            <div key={`o-${idx}`} className="text-[9px] p-1 rounded bg-white shadow-sm text-purple-800 border border-purple-200 mb-0.5 w-full text-left group/shift relative">
                                                <div className="font-bold flex items-center justify-between gap-1">
                                                    <span className="flex items-center min-w-0"><Briefcase size={8} className="mr-1 shrink-0"/> <span className="truncate">{isVerlof ? "Verlof" : `${formatTime(e.sortStart)} - ${formatTime(e.sortEnd)}`}</span></span>
                                                    {e.uid && (
                                                        <span className="flex items-center gap-1 shrink-0 opacity-0 group-hover/shift:opacity-100 transition-opacity">
                                                            <button onClick={(ev)=>{ev.stopPropagation(); openEditShift(dateKey, e);}} className="text-gray-400 hover:text-blue-600" title="Dienst aanpassen"><Pencil size={10}/></button>
                                                            <button onClick={(ev)=>{ev.stopPropagation(); handleHideRosterShift(e.uid);}} className="text-gray-400 hover:text-red-600" title="Dienst verwijderen"><Trash2 size={10}/></button>
                                                        </span>
                                                    )}
                                                </div>
                                                {!isVerlof && txt && <div className="truncate opacity-80">{txt}</div>}
                                                {e.edited && <div className="text-[8px] text-blue-600 italic flex items-center gap-0.5"><Pencil size={7}/> aangepast</div>}
                                            </div>
                                        );
                                    }
                                    if (e.type === 'manual') {
                                        // G4S Geïmporteerde tijdvak (voorlopig, wordt overschreven door echte dienst)
                                        if (e.isG4SShift) {
                                            return (

                                                            <Clock size={8}/> Tijdvak: {e.summary.replace('Dienst ', '')}
