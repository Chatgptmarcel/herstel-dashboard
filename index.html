                                            value={newMinoxStartDateInput} 
                                            onChange={e => setNewMinoxStartDateInput(e.target.value)}
                                        />
                                    </div>
                                </div>

                                <div className="flex justify-end gap-2 mt-6 pt-4 border-t">
                                    <button onClick={() => setShowMinoxSettingsModal(false)} className="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Annuleren</button>
                                    <button onClick={handleMinoxDateChange} className="px-4 py-2 text-sm font-bold bg-purple-600 text-white rounded-lg hover:bg-purple-700 shadow-sm flex items-center gap-2"><Save size={16}/> Opslaan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FILTER DROPDOWN */}
                    {showFilters && (
                        <div className="fixed top-20 right-4 bg-white rounded-xl shadow-2xl border p-4 z-40 w-64">
                            <div className="flex justify-between items-center mb-3 pb-2 border-b">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                    <Filter size={16}/> Kalender Filters
                                </h3>
                                <button onClick={() => setShowFilters(false)}>
                                    <X size={18} className="text-gray-400 hover:text-gray-600"/>
                                </button>
                            </div>
                            <div className="space-y-2">
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showSwimming} onChange={() => toggleFilter('showSwimming')} className="w-4 h-4 rounded text-blue-600"/>
                                    <Droplets size={16} className="text-blue-500"/>
                                    <span className="text-sm">Zwemtijden</span>
                                </label>
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showTraining} onChange={() => toggleFilter('showTraining')} className="w-4 h-4 rounded text-red-600"/>
                                    <Activity size={16} className="text-red-500"/>
                                    <span className="text-sm">Arm Training</span>
                                </label>
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showSobriety} onChange={() => toggleFilter('showSobriety')} className="w-4 h-4 rounded text-green-600"/>
                                    <CheckCircle size={16} className="text-green-500"/>
                                    <span className="text-sm">Nuchterheid</span>
                                </label>
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showAmber} onChange={() => toggleFilter('showAmber')} className="w-4 h-4 rounded text-pink-600"/>
                                    <Heart size={16} className="text-pink-500"/>
                                    <span className="text-sm">Amber's Rooster</span>
                                </label>
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showWork} onChange={() => toggleFilter('showWork')} className="w-4 h-4 rounded text-purple-600"/>
                                    <Briefcase size={16} className="text-purple-500"/>
                                    <span className="text-sm">Werk/Diensten</span>
                                </label>
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showNotes} onChange={() => toggleFilter('showNotes')} className="w-4 h-4 rounded text-gray-600"/>
                                    <StickyNote size={16} className="text-gray-500"/>
                                    <span className="text-sm">Notities</span>
                                </label>
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showSalary} onChange={() => toggleFilter('showSalary')} className="w-4 h-4 rounded text-yellow-600"/>
                                    <span className="text-yellow-500">💰</span>
                                    <span className="text-sm">Salarisdagen</span>
                                </label>
                                <label className="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                                    <input type="checkbox" checked={calendarFilters.showTijdvak} onChange={() => toggleFilter('showTijdvak')} className="w-4 h-4 rounded text-amber-600"/>
                                    <Clock size={16} className="text-amber-500"/>
                                    <span className="text-sm">Tijdvakken</span>
                                </label>
                            </div>
                        </div>
                    )}

                    {/* MODAL: PDF Rooster Upload */}
                    {showPdfModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                        <Upload size={20}/> G4S Rooster Importeren
                                    </h3>
                                    <button onClick={() => { setShowPdfModal(false); setParsedShifts([]); setPdfError(null); }}>
                                        <X className="text-gray-400 hover:text-gray-600"/>
                                    </button>
                                </div>
                                
                                {/* Upload Sectie */}
                                {parsedShifts.length === 0 && (
                                    <div className="space-y-4">
                                        <p className="text-sm text-gray-600">
                                            Upload je G4S tijdvakrooster PDF. Het systeem herkent automatisch de diensten en voegt ze toe aan je kalender.
                                        </p>
                                        
                                        <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-orange-300 rounded-lg cursor-pointer bg-orange-50 hover:bg-orange-100 transition-colors">
                                            <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                                {pdfParsing ? (
                                                    <>
                                                        <RefreshCw className="w-8 h-8 text-orange-500 animate-spin mb-2"/>
                                                        <p className="text-sm text-orange-600 font-medium">PDF wordt verwerkt...</p>
                                                    </>
                                                ) : (
                                                    <>
                                                        <FileText className="w-8 h-8 text-orange-500 mb-2"/>
                                                        <p className="text-sm text-gray-600"><span className="font-semibold text-orange-600">Klik om PDF te selecteren</span></p>
                                                        <p className="text-xs text-gray-500 mt-1">G4S Tijdvakrooster PDF</p>
                                                    </>
                                                )}
                                            </div>
                                            <input 
                                                type="file" 
                                                className="hidden" 
                                                accept=".pdf"
                                                onChange={handlePdfUpload}
                                                disabled={pdfParsing}
                                            />
                                        </label>

                                        {pdfError && (
                                            <div className="flex items-start gap-2 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                                                <AlertCircle size={18} className="shrink-0 mt-0.5"/>
                                                <span>{pdfError}</span>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Preview Sectie */}
                                {parsedShifts.length > 0 && (
                                    <div className="flex flex-col flex-1 min-h-0">
                                        <div className="flex items-center justify-between mb-3">
                                            <p className="text-sm text-gray-600">
                                                <span className="font-bold text-green-600">{parsedShifts.filter(s => s.selected).length}</span> van <span className="font-bold">{parsedShifts.length}</span> diensten geselecteerd
                                            </p>
                                            <div className="flex gap-2">
                                                <button 
                                                    onClick={() => selectAllShifts(true)} 
                                                    className="text-xs text-blue-600 hover:text-blue-800 font-medium"
                                                >
                                                    Alles selecteren
                                                </button>
                                                <span className="text-gray-300">|</span>
                                                <button 
                                                    onClick={() => selectAllShifts(false)} 
                                                    className="text-xs text-gray-500 hover:text-gray-700 font-medium"
                                                >
                                                    Niets selecteren
                                                </button>
                                            </div>
                                        </div>

                                        <div className="flex-1 overflow-y-auto border rounded-lg divide-y custom-scrollbar min-h-0 max-h-64">
                                            {parsedShifts.map((shift, index) => (
                                                <div 
                                                    key={index}
                                                    onClick={() => toggleShiftSelection(index)}
                                                    className={`flex items-center gap-3 p-3 cursor-pointer transition-colors ${
                                                        shift.selected ? 'bg-green-50 hover:bg-green-100' : 'bg-white hover:bg-gray-50'
                                                    }`}
                                                >
                                                    <div className={`w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 ${
                                                        shift.selected ? 'bg-green-500 border-green-500' : 'border-gray-300'
                                                    }`}>
                                                        {shift.selected && <Check size={14} className="text-white"/>}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-sm font-medium text-gray-800 truncate">{shift.dateDisplay}</p>
                                                        <p className="text-xs text-orange-600 font-bold">{shift.time}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="flex gap-2 mt-4 pt-4 border-t">
                                            <button 
                                                onClick={() => { setParsedShifts([]); setPdfError(null); }}
                                                className="flex-1 px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors"
                                            >
                                                Andere PDF
                                            </button>
                                            <button 
                                                onClick={importSelectedShifts}
                                                disabled={parsedShifts.filter(s => s.selected).length === 0}
                                                className="flex-1 px-4 py-2 text-sm font-bold bg-green-600 text-white rounded-lg hover:bg-green-700 shadow-sm flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                                            >
                                                <Check size={16}/> Importeren ({parsedShifts.filter(s => s.selected).length})
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MODAL: Tijdvak Rooster Upload */}
                    {showTijdvakModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                        <Clock size={20} className="text-amber-500"/> Tijdvakkenrooster Invoeren
                                    </h3>
                                    <button onClick={closeTijdvakModal}>
                                        <X className="text-gray-400 hover:text-gray-600"/>
                                    </button>
                                </div>

                                {/* Maand/Jaar selectie */}
                                <div className="flex gap-4 mb-4">
                                    <select
                                        className="flex-1 border p-2 rounded text-sm"
                                        value={tijdvakMonth}
                                        onChange={e => { setTijdvakMonth(parseInt(e.target.value)); setTijdvakBulkParsed([]); }}
                                    >
                                        {mNames.map((name, idx) => (
                                            <option key={idx} value={idx}>{name}</option>
                                        ))}
                                    </select>
                                    <select
                                        className="flex-1 border p-2 rounded text-sm"
                                        value={tijdvakYear}
                                        onChange={e => { setTijdvakYear(parseInt(e.target.value)); setTijdvakBulkParsed([]); }}
                                    >
                                        <option value="2025">2025</option>
                                        <option value="2026">2026</option>
                                        <option value="2027">2027</option>
                                    </select>
                                </div>

                                {tijdvakBulkParsed.length === 0 && (
                                    <div className="space-y-4">
                                        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                                            <p className="text-sm text-amber-800 font-medium mb-2">📋 Hoe werkt het?</p>
                                            <ol className="text-xs text-amber-700 space-y-1 list-decimal list-inside">
                                                <li>Maak een screenshot van je tijdvakkenrooster in de G4S Connect app</li>
                                                <li>Lees de tijden af en typ ze hieronder in</li>
                                                <li>Of kopieer/plak de tekst als je die hebt</li>
                                            </ol>
                                        </div>

                                        {/* Handmatige invoer */}
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-gray-500 uppercase">Voer tijdvakken in</label>
                                            <p className="text-xs text-gray-500">Format: <code className="bg-gray-100 px-1 rounded">29: 07:15-13:45</code> of <code className="bg-gray-100 px-1 rounded">29-1: 07:15-13:45</code></p>
                                            <textarea
                                                className="w-full border p-3 rounded text-sm min-h-[120px] font-mono"
                                                placeholder="29: 07:15-13:45&#10;30: 08:30-12:00&#10;4-2: 04:15-14:15&#10;5-2: 05:15-15:15"
                                                value={tijdvakBulkInput}
                                                onChange={e => setTijdvakBulkInput(e.target.value)}
                                            />
                                            <button
                                                onClick={handleTijdvakBulkParse}
                                                disabled={!tijdvakBulkInput.trim()}
                                                className="w-full px-4 py-2 text-sm font-bold bg-amber-500 text-white rounded-lg hover:bg-amber-600 disabled:opacity-50 transition-colors"
                                            >
                                                Tijdvakken Verwerken
                                            </button>
                                        </div>

                                        {/* Tip */}
                                        <div className="text-xs text-gray-500 bg-gray-50 p-3 rounded-lg">
                                            <strong>💡 Tip:</strong> Als je de tijdvakken van meerdere weken hebt, kun je ze allemaal tegelijk invoeren. Het systeem herkent automatisch de datums.
                                        </div>
                                    </div>
                                )}

                                {/* Parsed results */}
                                {tijdvakBulkParsed.length > 0 && (
                                    <div className="flex flex-col flex-1 min-h-0">
                                        <div className="flex justify-between mb-3">
                                            <p className="text-sm"><span className="font-bold text-amber-600">{tijdvakBulkParsed.filter(s => s.selected).length}</span> tijdvakken gevonden</p>
                                            <button onClick={() => { setTijdvakBulkParsed([]); setTijdvakBulkInput(""); }} className="text-xs text-gray-500 hover:text-gray-700">← Terug</button>
                                        </div>

                                        <div className="flex-1 overflow-y-auto border rounded-lg divide-y max-h-64">
                                            {tijdvakBulkParsed.map((shift, index) => (
                                                <div
                                                    key={index}
                                                    onClick={() => toggleTijdvakBulkSelection(index)}
                                                    className={`flex items-center gap-3 p-3 cursor-pointer transition-colors ${shift.selected ? 'bg-amber-50 hover:bg-amber-100' : 'bg-white hover:bg-gray-50'}`}
                                                >
                                                    <div className={`w-5 h-5 rounded border-2 flex items-center justify-center ${shift.selected ? 'bg-amber-500 border-amber-500' : 'border-gray-300'}`}>
                                                        {shift.selected && <Check size={14} className="text-white"/>}
                                                    </div>
                                                    <div className="flex-1">
                                                        <p className="text-sm font-medium">{shift.dateDisplay}</p>
                                                        <p className="text-xs text-amber-600 font-bold">{shift.startTime} - {shift.endTime}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="flex gap-2 mt-4 pt-4 border-t">
                                            <button onClick={closeTijdvakModal} className="flex-1 px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg">
                                                Annuleren
                                            </button>
                                            <button
                                                onClick={importTijdvakBulkShifts}
                                                disabled={tijdvakBulkParsed.filter(s => s.selected).length === 0}
                                                className="flex-1 px-4 py-2 text-sm font-bold bg-amber-500 text-white rounded-lg hover:bg-amber-600 disabled:opacity-50 flex items-center justify-center gap-2"
                                            >
                                                <Check size={16}/> Importeren ({tijdvakBulkParsed.filter(s => s.selected).length})
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
