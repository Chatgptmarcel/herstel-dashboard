name: Sync WK 2026

on:
  schedule:
    - cron: '0 * * * *'    # elk uur — openfootball werkt ~dagelijks bij, dus dit is ruim vers genoeg
  workflow_dispatch:        # handmatige knop in het Actions-tabblad ("update WK" zonder te wachten)

permissions:
  contents: write           # nodig om wk-data.json te committen

concurrency:
  group: sync-wk
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Haal openfootball-bron op en zet om naar wk-data.json
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json" \
            -o wk-raw.json
          node sync/wk-sync.js wk-raw.json wk-data.json
          rm -f wk-raw.json

      - name: Commit bij wijziging
        run: |
          git config user.name "wk-sync-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- wk-data.json; then
            echo "Geen wijziging in de WK-data."
          else
            git add wk-data.json
            git commit -m "WK-data automatisch bijgewerkt"
            git push
          fi
